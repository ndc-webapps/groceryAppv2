<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>GroceryGuard — Smart Budget Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script>window.generateId = () => `${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;</script>
  <style>
    :root {
      --brand: #22c55e;
      --brand-dark: #16a34a;
      --brand-light: #bbf7d0;
      --accent: #f59e0b;
      --danger: #ef4444;
      --surface: #ffffff;
      --surface-2: #f8fafc;
      --surface-3: #f1f5f9;
      --border: #e2e8f0;
      --text-1: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 16px rgba(0,0,0,.08), 0 2px 8px rgba(0,0,0,.04);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.1), 0 4px 16px rgba(0,0,0,.06);
      --radius: 16px;
      --radius-lg: 24px;
      --radius-xl: 32px;
      --nav-height: 64px;
      --bar-height: 140px;
    }
    .dark {
      --brand: #4ade80;
      --brand-dark: #22c55e;
      --brand-light: #166534;
      --accent: #fbbf24;
      --surface: #0f172a;
      --surface-2: #1e293b;
      --surface-3: #334155;
      --border: #1e293b;
      --text-1: #f1f5f9;
      --text-2: #94a3b8;
      --text-3: #475569;
      --shadow-sm: 0 1px 3px rgba(0,0,0,.3);
      --shadow-md: 0 4px 16px rgba(0,0,0,.4);
      --shadow-lg: 0 10px 40px rgba(0,0,0,.5);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--surface-2);
      color: var(--text-1);
      margin: 0;
      min-height: 100vh;
      transition: background .3s, color .3s;
    }
    h1,h2,h3,h4 { font-family: 'Syne', sans-serif; }
    #root { max-width: 480px; margin: 0 auto; position: relative; min-height: 100vh; background: var(--surface); box-shadow: var(--shadow-lg); }

    /* --- Utility animations --- */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.94); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    @keyframes pulse-ring {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,.35); }
      70%  { box-shadow: 0 0 0 12px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes bounceIn {
      0%   { transform: scale(.8); opacity: 0; }
      60%  { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); }
    }

    .fade-up    { animation: fadeUp .32s cubic-bezier(.22,1,.36,1) both; }
    .scale-in   { animation: scaleIn .22s ease both; }
    .slide-right{ animation: slideInRight .28s cubic-bezier(.22,1,.36,1) both; }
    .bounce-in  { animation: bounceIn .4s cubic-bezier(.34,1.56,.64,1) both; }

    /* --- Item card --- */
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s, transform .15s;
      position: relative;
      overflow: hidden;
    }
    .item-card:hover { box-shadow: var(--shadow-md); }
    .item-card::before {
      content:'';
      position: absolute;
      left:0; top:0; bottom:0;
      width:3px;
      background: linear-gradient(to bottom, var(--brand), var(--brand-dark));
      border-radius:4px 0 0 4px;
    }

    /* --- Pill badge --- */
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
    }

    /* --- Budget bar --- */
    .budget-bar-track {
      height: 6px;
      background: var(--surface-3);
      border-radius: 999px;
      overflow: hidden;
    }
    .budget-bar-fill {
      height: 100%;
      border-radius: 999px;
      transition: width .5s cubic-bezier(.22,1,.36,1), background .3s;
    }

    /* --- Custom scrollbar --- */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 999px; }

    /* --- Bottom nav --- */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 40;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 0;
      gap: 3px;
      cursor: pointer;
      background: none;
      border: none;
      transition: color .2s;
      color: var(--text-3);
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
    }
    .nav-btn.active { color: var(--brand); }
    .nav-btn .icon { font-size: 22px; line-height: 1; }

    /* --- FAB --- */
    .fab {
      position: fixed;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff;
      font-size: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 24px rgba(22,163,74,.4);
      border: none;
      cursor: pointer;
      z-index: 30;
      transition: transform .15s, box-shadow .15s;
    }
    .fab:active { transform: scale(.9); }
    .fab:hover  { box-shadow: 0 8px 28px rgba(22,163,74,.5); animation: pulse-ring 1.5s infinite; }

    /* --- Summary bar --- */
    .summary-bar {
      position: fixed;
      bottom: var(--nav-height);
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      z-index: 20;
      padding: 14px 20px;
      padding-bottom: 10px;
    }

    /* --- Modal overlay --- */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 50;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }
    @media (min-width: 480px) {
      .modal-overlay { align-items: center; padding: 20px; }
    }
    .modal-sheet {
      background: var(--surface);
      width: 100%;
      max-width: 480px;
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      padding: 24px 24px 32px;
      animation: fadeUp .28s cubic-bezier(.22,1,.36,1) both;
      max-height: 92vh;
      overflow-y: auto;
    }
    @media (min-width: 480px) {
      .modal-sheet {
        border-radius: var(--radius-xl);
        padding: 32px;
        max-height: 85vh;
      }
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 999px;
      margin: 0 auto 20px;
    }

    /* --- Inputs --- */
    .field {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-2);
      color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: border .2s, box-shadow .2s;
      -webkit-appearance: none;
    }
    .field:focus {
      outline: none;
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(34,197,94,.15);
    }
    .field::placeholder { color: var(--text-3); }

    /* --- Buttons --- */
    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--brand), var(--brand-dark));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(22,163,74,.3);
      transition: transform .15s, box-shadow .15s, opacity .15s;
      letter-spacing: .3px;
    }
    .btn-primary:hover   { box-shadow: 0 6px 20px rgba(22,163,74,.4); transform: translateY(-1px); }
    .btn-primary:active  { transform: scale(.97); }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-ghost {
      padding: 12px 14px;
      border-radius: var(--radius);
      background: var(--surface-3);
      color: var(--text-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-ghost:hover { background: var(--border); }

    /* --- Swipe delete layer --- */
    .swipe-wrapper { position: relative; overflow: hidden; border-radius: var(--radius); margin-bottom: 12px; }
    .swipe-delete-bg {
      position: absolute;
      right: 0; top: 0; bottom: 0;
      width: 80px;
      background: #fee2e2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      border-radius: var(--radius);
    }
    .dark .swipe-delete-bg { background: #450a0a; }
    .swipe-content { transition: transform .25s cubic-bezier(.2,.9,.4,1.1); will-change: transform; }

    /* --- Receipt --- */
    .receipt-line {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed var(--border);
      font-size: 14px;
    }
    .receipt-line:last-child { border-bottom: none; }

    /* --- Empty state --- */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
      gap: 12px;
    }
    .empty-icon {
      width: 80px; height: 80px;
      background: var(--surface-3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }

    /* --- Header top bar --- */
    .top-bar {
      position: sticky;
      top: 0; z-index: 30;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* --- Store card start screen --- */
    .start-card {
      margin: 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      box-shadow: var(--shadow-md);
    }
    .hero-ring {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      margin: 0 auto 16px;
    }
    .dark .hero-ring { background: linear-gradient(135deg, #14532d, #166534); }

    /* --- Quick chips --- */
    .chip {
      padding: 7px 14px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s, border .15s;
      white-space: nowrap;
    }
    .chip:hover { background: var(--brand-light); border-color: var(--brand); }

    /* --- Stat card --- */
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow-sm);
    }

    /* --- Confirm modal --- */
    .confirm-modal {
      background: var(--surface);
      border-radius: var(--radius-xl);
      padding: 28px 24px;
      max-width: 320px;
      width: calc(100% - 40px);
      animation: scaleIn .22s ease both;
    }

    /* Cart in-session sub-header */
    .session-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      position: sticky;
      top: 65px;
      z-index: 20;
    }

    /* Image upload preview */
    .img-preview {
      width: 64px; height: 64px;
      border-radius: var(--radius);
      object-fit: cover;
      border: 2px solid var(--border);
    }

    /* Month group label */
    .month-label {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 16px 20px 8px;
    }

    /* History card */
    .history-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin: 0 16px 10px;
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow .2s;
    }
    .history-card:hover { box-shadow: var(--shadow-md); }
    .history-icon {
      width: 44px; height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .dark .history-icon { background: linear-gradient(135deg, #14532d, #166534); }

    /* suggestion chip */
    .sug-chip {
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--surface-3);
      border: 1px solid var(--border);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background .15s;
    }
    .sug-chip:hover { background: var(--brand-light); }

    /* item count badge on nav */
    .badge {
      position: absolute;
      top: 4px;
      right: calc(50% - 16px);
      background: var(--brand);
      color: #fff;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
      animation: bounceIn .3s cubic-bezier(.34,1.56,.64,1) both;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--text-1);
      color: var(--surface);
      padding: 12px 22px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      box-shadow: var(--shadow-lg);
      animation: fadeUp .3s ease both;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Swipe hint */
    .swipe-hint {
      font-size: 11px;
      color: var(--text-3);
      text-align: right;
      padding: 0 20px 6px;
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const SK = {
  sessions: 'gg_sessions_v2',
  freq:     'gg_freq_v2',
  dark:     'gg_dark_v2',
  stores:   'gg_stores_v2',
};

const load = (k, d) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : d; } catch { return d; } };
const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

const updateFreq = (name) => {
  if (!name?.trim()) return;
  const f = load(SK.freq, {});
  const key = name.trim().toLowerCase();
  f[key] = { name: name.trim(), count: (f[key]?.count || 0) + 1 };
  save(SK.freq, f);
};
const getSuggestions = (text) => {
  if (!text) return [];
  const f = load(SK.freq, {});
  return Object.values(f)
    .filter(e => e.name.toLowerCase().includes(text.toLowerCase()))
    .sort((a,b) => b.count - a.count)
    .slice(0, 5).map(e => e.name);
};

// ── Toast ──────────────────────────────────
const Toast = ({ msg }) => msg ? <div className="toast">✓ {msg}</div> : null;

// ── Confirm Dialog ────────────────────────
const ConfirmDialog = ({ title, body, confirmLabel='Confirm', onConfirm, onCancel }) => (
  <div className="modal-overlay" onClick={onCancel}>
    <div className="confirm-modal" onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:36,textAlign:'center',marginBottom:12}}>⚠️</div>
      <h3 style={{fontFamily:'Syne',fontWeight:700,fontSize:18,textAlign:'center',marginBottom:8}}>{title}</h3>
      <p style={{color:'var(--text-2)',fontSize:14,textAlign:'center',lineHeight:1.6,marginBottom:20}}>{body}</p>
      <div style={{display:'flex',gap:10}}>
        <button className="btn-ghost" style={{flex:1}} onClick={onCancel}>Cancel</button>
        <button className="btn-primary" style={{flex:1,width:'auto',background:'linear-gradient(135deg,#ef4444,#dc2626)',boxShadow:'0 4px 16px rgba(239,68,68,.3)'}} onClick={onConfirm}>{confirmLabel}</button>
      </div>
    </div>
  </div>
);

// ── Swipe-to-delete wrapper ───────────────
const SwipeRow = ({ children, onSwipeTrigger }) => {
  const ref = useRef(null);
  const startX = useRef(0), startY = useRef(0);
  const swiped = useRef(false);

  const reset = () => {
    if (ref.current) ref.current.style.transform = 'translateX(0)';
    swiped.current = false;
  };

  const onTouchStart = e => {
    startX.current = e.touches[0].clientX;
    startY.current = e.touches[0].clientY;
  };
  const onTouchMove = e => {
    const dx = e.touches[0].clientX - startX.current;
    const dy = Math.abs(e.touches[0].clientY - startY.current);
    if (Math.abs(dx) > dy && dx < 0) {
      e.preventDefault();
      if (ref.current) ref.current.style.transform = `translateX(${Math.max(-80, dx)}px)`;
    }
  };
  const onTouchEnd = e => {
    const dx = e.changedTouches[0].clientX - startX.current;
    if (dx < -50) {
      if (ref.current) ref.current.style.transform = 'translateX(-72px)';
      swiped.current = true;
      // show confirm; pass reset so dialog can snap back on cancel
      onSwipeTrigger(reset);
    } else {
      reset();
    }
  };

  return (
    <div className="swipe-wrapper">
      <div className="swipe-delete-bg">🗑️</div>
      <div ref={ref} className="swipe-content" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
        {children}
      </div>
    </div>
  );
};

// ── Item Card ────────────────────────────
const ItemCard = ({ item, index, onEdit, onDelete, onSwipeTrigger }) => {
  const subtotal = (item.quantity * item.price).toFixed(2);
  return (
    <SwipeRow onSwipeTrigger={onSwipeTrigger}>
      <div className="item-card" style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:48,height:48,borderRadius:12,background:'var(--surface-3)',overflow:'hidden',flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>
          {item.imageBase64
            ? <img src={item.imageBase64} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}} />
            : '🛒'}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.name}</div>
          <div style={{fontSize:13,color:'var(--text-2)',marginTop:2}}>{item.quantity} × ${item.price.toFixed(2)}</div>
        </div>
        <div style={{textAlign:'right',flexShrink:0}}>
          <div style={{fontFamily:'Syne',fontWeight:800,fontSize:17,color:'var(--brand)'}}>${subtotal}</div>
          <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:6}}>
            <button onClick={() => onEdit(index)} style={{width:30,height:30,borderRadius:8,background:'var(--surface-3)',border:'none',cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',transition:'background .15s'}} title="Edit">✏️</button>
          </div>
        </div>
      </div>
    </SwipeRow>
  );
};

// ── Add/Edit Modal ──────────────────────
const ItemModal = ({ isOpen, onClose, onSave, initialItem }) => {
  const [name, setName] = useState('');
  const [qty,  setQty]  = useState(1);
  const [price,setPrice]= useState('');
  const [img,  setImg]  = useState('');
  const [sugs, setSugs] = useState([]);
  const fileRef = useRef();

  useEffect(() => {
    if (isOpen) {
      setName(initialItem?.name || '');
      setQty(initialItem?.quantity || 1);
      setPrice(initialItem?.price || '');
      setImg(initialItem?.imageBase64 || '');
    }
  }, [isOpen, initialItem]);

  useEffect(() => { setSugs(name ? getSuggestions(name) : []); }, [name]);

  const handleImg = e => {
    const f = e.target.files[0];
    if (f) { const r = new FileReader(); r.onloadend = ()=>setImg(r.result); r.readAsDataURL(f); }
  };

  const handleSave = () => {
    if (!name.trim()) return showAlert('Enter an item name');
    const q = parseFloat(qty), p = parseFloat(price);
    if (!q || q <= 0) return showAlert('Quantity must be > 0');
    if (!p || p <= 0) return showAlert('Price must be > 0');
    onSave({ id: initialItem?.id || generateId(), name: name.trim(), quantity: q, price: p, imageBase64: img || null });
    updateFreq(name.trim());
    onClose();
  };

  const showAlert = (msg) => alert(msg);

  if (!isOpen) return null;
  return (
    <div className="modal-overlay" onClick={e=>{ if(e.target===e.currentTarget) return; }}>
      <div className="modal-sheet" onClick={e=>e.stopPropagation()}>
        <div className="modal-handle" />
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22}}>
          <h3 style={{fontFamily:'Syne',fontWeight:800,fontSize:20,margin:0}}>
            {initialItem ? 'Edit Item' : 'Add Item'}
          </h3>
          <button onClick={onClose} style={{width:32,height:32,borderRadius:999,background:'var(--surface-3)',border:'none',cursor:'pointer',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--text-2)'}}>✕</button>
        </div>

        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text-2)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Item Name</label>
            <input className="field" type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Fresh Avocado" autoFocus />
            {sugs.length > 0 && (
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:8}}>
                {sugs.map(s => <button key={s} className="sug-chip" onClick={()=>setName(s)}>{s}</button>)}
              </div>
            )}
          </div>

          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div>
              <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text-2)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Quantity</label>
              <input className="field" type="number" step="0.5" min="0.5" value={qty} onChange={e=>setQty(e.target.value)} />
            </div>
            <div>
              <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text-2)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Price ($)</label>
              <input className="field" type="number" step="0.01" min="0.01" value={price} onChange={e=>setPrice(e.target.value)} placeholder="0.00" />
            </div>
          </div>

          {price && qty && parseFloat(price)>0 && parseFloat(qty)>0 && (
            <div style={{background:'var(--surface-3)',borderRadius:var_radius,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',fontSize:14}}>
              <span style={{color:'var(--text-2)'}}>Subtotal</span>
              <span style={{fontFamily:'Syne',fontWeight:800,color:'var(--brand)',fontSize:16}}>${(parseFloat(price)*parseFloat(qty)).toFixed(2)}</span>
            </div>
          )}

          <div>
            <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text-2)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:6}}>Photo (optional)</label>
            <input type="file" accept="image/*" capture="environment" ref={fileRef} onChange={handleImg} style={{display:'none'}} />
            <div style={{display:'flex',gap:10,alignItems:'center'}}>
              <button className="btn-ghost" style={{fontSize:13,padding:'10px 16px'}} onClick={()=>fileRef.current.click()}>📷 Take Photo</button>
              {img && <img src={img} className="img-preview" alt="preview" />}
              {img && <button onClick={()=>setImg('')} style={{background:'none',border:'none',cursor:'pointer',color:'var(--text-3)',fontSize:18}}>✕</button>}
            </div>
          </div>

          <div style={{display:'flex',gap:10,paddingTop:4}}>
            <button className="btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
            <button className="btn-primary" style={{flex:2}} onClick={handleSave}>{initialItem ? 'Update Item' : 'Add to Cart'}</button>
          </div>
        </div>
      </div>
    </div>
  );
};

// helper for CSS var in JSX expressions
const var_radius = 'var(--radius)';

// ── Receipt Modal ───────────────────────
const ReceiptModal = ({ session, onClose }) => {
  if (!session) return null;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" style={{maxHeight:'88vh'}} onClick={e=>e.stopPropagation()}>
        <div className="modal-handle" />
        <div style={{textAlign:'center',borderBottom:'1px solid var(--border)',paddingBottom:16,marginBottom:16}}>
          <div style={{fontSize:36,marginBottom:8}}>🧾</div>
          <h2 style={{fontFamily:'Syne',fontWeight:800,fontSize:22,margin:'0 0 4px'}}>{session.storeName}</h2>
          <div style={{fontSize:13,color:'var(--text-3)'}}>{new Date(session.dateTime).toLocaleString()}</div>
          <div className="pill" style={{background:'var(--surface-3)',color:'var(--text-2)',marginTop:8}}>{session.items.length} items</div>
        </div>
        <div style={{overflowY:'auto',flex:1}}>
          {session.items.map((it,i) => (
            <div key={i} className="receipt-line">
              <div>
                <span style={{fontWeight:500}}>{it.name}</span>
                <span style={{color:'var(--text-3)',fontSize:12,marginLeft:6}}>×{it.quantity}</span>
              </div>
              <span style={{fontWeight:700,color:'var(--brand)'}}>${(it.quantity*it.price).toFixed(2)}</span>
            </div>
          ))}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',paddingTop:14,borderTop:'2px solid var(--text-1)'}}>
            <span style={{fontFamily:'Syne',fontWeight:800,fontSize:17}}>TOTAL</span>
            <span style={{fontFamily:'Syne',fontWeight:800,fontSize:20,color:'var(--brand)'}}>${session.totalAmount.toFixed(2)}</span>
          </div>
        </div>
        <button className="btn-ghost" style={{marginTop:20,width:'100%'}} onClick={onClose}>Close Receipt</button>
      </div>
    </div>
  );
};

// ── Main App ─────────────────────────────
const App = () => {
  const [tab, setTab]             = useState('shopping');
  const [storeName, setStoreName] = useState('');
  const [storeInput, setStoreInput]= useState('');
  const [items, setItems]         = useState([]);
  const [budget, setBudget]       = useState(0);
  const [budgetInput, setBudgetInput] = useState('');
  const [sessionOn, setSessionOn] = useState(false);
  const [modalOpen, setModalOpen] = useState(false);
  const [editIdx, setEditIdx]     = useState(null);
  const [sessions, setSessions]   = useState([]);
  const [receipt, setReceipt]     = useState(null);
  const [dark, setDark]           = useState(false);
  const [toast, setToast]         = useState('');
  const [confirm, setConfirm]     = useState(null);
  const [historyFilter, setHistoryFilter] = useState('all'); // 'all' | 'YYYY-MM'
  const [compareSearch, setCompareSearch] = useState('');
  const [compareStore,  setCompareStore]  = useState('all');

  const mChart = useRef(null), sChart = useRef(null), pChart = useRef(null);

  const total = items.reduce((s,i)=>s+i.quantity*i.price, 0);
  const totalQty = items.reduce((s,i)=>s+i.quantity, 0);
  const remaining = budget - total;
  const pct = budget > 0 ? Math.min((total / budget) * 100, 100) : 0;
  const overBudget = budget > 0 && total > budget;
  const nearBudget = budget > 0 && remaining > 0 && remaining <= budget * 0.15;

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''), 2500); };

  useEffect(() => {
    setSessions(load(SK.sessions, []));
    const d = load(SK.dark, window.matchMedia('(prefers-color-scheme: dark)').matches);
    setDark(d);
  }, []);

  useEffect(() => {
    save(SK.dark, dark);
    document.documentElement.classList.toggle('dark', dark);
  }, [dark]);

  const startSession = () => {
    const name = storeInput.trim();
    if (!name) return alert('Enter a store name');
    setStoreName(name);
    setSessionOn(true);
    setItems([]);
    setBudget(0);
    setBudgetInput('');
    const recent = load(SK.stores, []);
    save(SK.stores, [name, ...recent.filter(s=>s!==name)].slice(0, 5));
  };

  const saveSession = () => {
    if (!storeName) return;
    if (items.length === 0) return alert('Add at least one item');
    const s = { id: generateId(), storeName, dateTime: new Date().toISOString(), totalAmount: total, items: [...items] };
    const updated = [s, ...sessions];
    setSessions(updated);
    save(SK.sessions, updated);
    showToast('Trip saved successfully!');
    resetSession();
  };

  const resetSession = () => {
    setItems([]); setStoreName(''); setStoreInput('');
    setSessionOn(false); setBudget(0); setBudgetInput('');
  };

  const promptNewTrip = () => {
    if (items.length > 0) {
      setConfirm({
        title: 'Start a new trip?',
        body: `You have ${items.length} item${items.length>1?'s':''} in your cart. They'll be discarded if you start a new trip.`,
        confirmLabel: 'Discard & Continue',
        onConfirm: () => { setConfirm(null); resetSession(); }
      });
    } else {
      resetSession();
    }
  };

  const addOrUpdate = (data) => {
    if (editIdx !== null) {
      const next = [...items];
      next[editIdx] = data;
      setItems(next);
      setEditIdx(null);
    } else {
      setItems([...items, data]);
    }
    setModalOpen(false);
  };

  const deleteItem = i => setItems(items.filter((_,idx)=>idx!==i));
  const editItem   = i => { setEditIdx(i); setModalOpen(true); };
  const deleteSession = id => { const u=sessions.filter(s=>s.id!==id); setSessions(u); save(SK.sessions, u); };

  // Analytics
  useEffect(() => {
    if (tab !== 'analytics' || sessions.length === 0) return;
    const mm = new Map(), sm = new Map(), pm = new Map();
    sessions.forEach(s => {
      const d = new Date(s.dateTime);
      const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      mm.set(mk, (mm.get(mk)||0)+s.totalAmount);
      sm.set(s.storeName, (sm.get(s.storeName)||0)+s.totalAmount);
      s.items.forEach(it=>pm.set(it.name,(pm.get(it.name)||0)+it.quantity));
    });
    const sorted = [...mm.keys()].sort();
    const mLabels = sorted.map(k=>{const[y,m]=k.split('-');return new Date(y,m-1).toLocaleString('default',{month:'short',year:'2-digit'});});
    const mData = sorted.map(k=>mm.get(k));
    const sLabels=[...sm.keys()], sData=sLabels.map(k=>sm.get(k));
    const top=[...pm.entries()].sort((a,b)=>b[1]-a[1]).slice(0,5);

    const colors=['#22c55e','#3b82f6','#f59e0b','#ec4899','#8b5cf6'];
    const gridColor = dark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.06)';
    const fontColor = dark ? '#94a3b8' : '#64748b';
    const chartDefaults = { responsive:true, maintainAspectRatio:true, plugins:{legend:{display:false}}, scales:{ x:{grid:{color:gridColor},ticks:{color:fontColor,font:{family:'DM Sans',size:11}}}, y:{grid:{color:gridColor},ticks:{color:fontColor,font:{family:'DM Sans',size:11},callback:v=>`$${v}`}} } };

    if (mChart.current) mChart.current.destroy();
    if (sChart.current) sChart.current.destroy();
    if (pChart.current) pChart.current.destroy();

    const c1=document.getElementById('mChart')?.getContext('2d');
    const c2=document.getElementById('sChart')?.getContext('2d');
    const c3=document.getElementById('pChart')?.getContext('2d');

    if (c1) mChart.current = new Chart(c1,{type:'bar',data:{labels:mLabels,datasets:[{data:mData,backgroundColor:colors[0],borderRadius:8,borderSkipped:false}]},options:{...chartDefaults}});
    if (c2) sChart.current = new Chart(c2,{type:'bar',data:{labels:sLabels,datasets:[{data:sData,backgroundColor:colors[1],borderRadius:8,borderSkipped:false}]},options:{...chartDefaults}});
    if (c3) pChart.current = new Chart(c3,{type:'doughnut',data:{labels:top.map(p=>p[0]),datasets:[{data:top.map(p=>p[1]),backgroundColor:colors,borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{position:'bottom',labels:{color:fontColor,font:{family:'DM Sans',size:12},padding:12}}}}});
  }, [tab, sessions, dark]);

  // ── Shopping Tab ─────────────────────
  const renderShopping = () => {
    const recentStores = load(SK.stores, []);
    if (!sessionOn) {
      return (
        <div className="fade-up" style={{paddingBottom:100}}>
          <div className="start-card">
            <div className="hero-ring">🛍️</div>
            <h2 style={{fontFamily:'Syne',fontWeight:800,fontSize:24,textAlign:'center',margin:'0 0 6px'}}>New Grocery Trip</h2>
            <p style={{color:'var(--text-2)',textAlign:'center',fontSize:14,margin:'0 0 22px',lineHeight:1.5}}>Track your spending in real-time and stay within budget</p>

            <div style={{marginBottom:16}}>
              <label style={{display:'block',fontSize:12,fontWeight:600,color:'var(--text-2)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Store Name</label>
              <input className="field" type="text" value={storeInput} onChange={e=>setStoreInput(e.target.value)} placeholder="e.g. Whole Foods, Trader Joe's" onKeyDown={e=>e.key==='Enter'&&startSession()} />
            </div>

            {recentStores.length > 0 && (
              <div style={{marginBottom:20}}>
                <div style={{fontSize:12,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Recent Stores</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                  {recentStores.slice(0,4).map(s=>(
                    <button key={s} className="chip" onClick={()=>setStoreInput(s)}>📌 {s}</button>
                  ))}
                </div>
              </div>
            )}

            <button className="btn-primary" onClick={startSession}>Start Trip →</button>
          </div>

          {sessions.length > 0 && (
            <div style={{padding:'16px 20px 0'}}>
              <div style={{fontSize:12,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:12}}>Last Trip</div>
              <div className="history-card" style={{margin:0,cursor:'pointer'}} onClick={()=>setReceipt(sessions[0])}>
                <div className="history-icon">🏪</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15}}>{sessions[0].storeName}</div>
                  <div style={{fontSize:13,color:'var(--text-2)',marginTop:2}}>{sessions[0].items.length} items • {new Date(sessions[0].dateTime).toLocaleDateString()}</div>
                </div>
                <div style={{fontFamily:'Syne',fontWeight:800,color:'var(--brand)',fontSize:16,flexShrink:0}}>${sessions[0].totalAmount.toFixed(2)}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Active session
    return (
      <>
        {/* Session sub-header */}
        <div className="session-header">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:18}}>📍</span>
              <span style={{fontFamily:'Syne',fontWeight:800,fontSize:17}}>{storeName}</span>
              {items.length > 0 && <span className="pill" style={{background:'var(--surface-3)',color:'var(--text-2)'}}>{items.length}</span>}
            </div>
            <button onClick={promptNewTrip} style={{background:'none',border:'1px solid #fecaca',color:'var(--danger)',borderRadius:999,padding:'5px 12px',fontSize:12,fontWeight:600,cursor:'pointer'}}>
              ✕ New Trip
            </button>
          </div>

          {/* Budget row */}
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <input className="field" type="number" value={budgetInput} onChange={e=>setBudgetInput(e.target.value)} onBlur={()=>setBudget(parseFloat(budgetInput)||0)} placeholder="Set budget..." style={{flex:1,padding:'8px 12px',fontSize:13}} />
            <button onClick={()=>setBudget(parseFloat(budgetInput)||0)} style={{padding:'8px 14px',borderRadius:var_radius,background:'var(--brand)',color:'#fff',border:'none',fontWeight:600,fontSize:13,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>Set</button>
          </div>
          {budget > 0 && (
            <div style={{marginTop:10}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:5}}>
                <span style={{fontSize:12,color:'var(--text-3)'}}>
                  {overBudget ? <span style={{color:'var(--danger)',fontWeight:600}}>⚠ Over budget by ${Math.abs(remaining).toFixed(2)}</span>
                   : nearBudget ? <span style={{color:'var(--accent)',fontWeight:600}}>⚠ ${remaining.toFixed(2)} left</span>
                   : <span>${remaining.toFixed(2)} remaining</span>}
                </span>
                <span style={{fontSize:12,color:'var(--text-3)'}}>${total.toFixed(2)} / ${budget.toFixed(2)}</span>
              </div>
              <div className="budget-bar-track">
                <div className="budget-bar-fill" style={{width:`${pct}%`, background: overBudget ? 'var(--danger)' : nearBudget ? 'var(--accent)' : 'var(--brand)'}} />
              </div>
            </div>
          )}
        </div>

        {/* Items list */}
        <div style={{padding:'16px 16px 0', paddingBottom: 'calc(var(--bar-height) + env(safe-area-inset-bottom, 0px) + 16px)'}}>
          {items.length === 0 ? (
            <div className="empty-state fade-up">
              <div className="empty-icon">🛒</div>
              <div style={{fontFamily:'Syne',fontWeight:700,fontSize:17}}>Cart is empty</div>
              <div style={{color:'var(--text-2)',fontSize:14}}>Tap the + button to add items</div>
            </div>
          ) : (
            <>
              <div className="swipe-hint">← swipe left to delete</div>
              {items.map((it,i) => (
                <div key={it.id||i} className="fade-up" style={{animationDelay:`${i*40}ms`}}>
                  <ItemCard
                    item={it} index={i}
                    onEdit={editItem}
                    onDelete={()=>deleteItem(i)}
                    onSwipeTrigger={(resetRow) => setConfirm({
                      title: 'Remove item?',
                      body: `"${it.name}" will be removed from your cart.`,
                      confirmLabel: 'Remove',
                      onConfirm: () => { setConfirm(null); deleteItem(i); },
                      onCancel: () => { setConfirm(null); resetRow(); }
                    })}
                  />
                </div>
              ))}
            </>
          )}
        </div>

        {/* FAB - positioned just above summary bar */}
        <button
          className="fab"
          style={{ bottom: `calc(var(--bar-height) + env(safe-area-inset-bottom, 0px) + var(--nav-height) + 12px)` }}
          onClick={()=>{ setEditIdx(null); setModalOpen(true); }}
          title="Add item"
        >+</button>

        {/* Summary bar - sits above bottom nav */}
        <div className="summary-bar" style={{bottom:`calc(var(--nav-height) + env(safe-area-inset-bottom, 0px))`}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Items</div>
              <div style={{fontFamily:'Syne',fontWeight:800,fontSize:22}}>{totalQty}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px'}}>Total</div>
              <div style={{fontFamily:'Syne',fontWeight:800,fontSize:26,color:overBudget?'var(--danger)':'var(--brand)'}}>${total.toFixed(2)}</div>
            </div>
          </div>
          <button className="btn-primary" onClick={saveSession} disabled={items.length===0} style={{padding:'12px',fontSize:14}}>
            💾 Save Trip
          </button>
        </div>
      </>
    );
  };

  // ── History Tab ──────────────────────
  const renderHistory = () => {
    // Build month groups from ALL sessions
    const groups = {};
    sessions.forEach(s => {
      const d = new Date(s.dateTime);
      const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
      if (!groups[k]) groups[k] = { label: d.toLocaleString('default',{month:'long',year:'numeric'}), list:[] };
      groups[k].list.push(s);
    });
    const sortedKeys = Object.keys(groups).sort((a,b)=>b.localeCompare(a));

    // Sessions visible after filter
    const visibleSessions = historyFilter === 'all'
      ? sessions
      : (groups[historyFilter]?.list || []);

    // Filtered groups for rendering
    const filteredGroups = historyFilter === 'all'
      ? sortedKeys.map(k => ({ k, ...groups[k] }))
      : (groups[historyFilter] ? [{ k: historyFilter, ...groups[historyFilter] }] : []);

    const allTime = sessions.reduce((s,x)=>s+x.totalAmount,0);
    const filteredTotal = visibleSessions.reduce((s,x)=>s+x.totalAmount,0);

    return (
      <div style={{paddingBottom:80}} className="fade-up">
        {sessions.length === 0 ? (
          <div className="empty-state" style={{paddingTop:80}}>
            <div className="empty-icon">📁</div>
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:17}}>No trips yet</div>
            <div style={{color:'var(--text-2)',fontSize:14}}>Complete a grocery run to see it here</div>
          </div>
        ) : (
          <>
            {/* Stat cards */}
            <div style={{padding:'16px 16px 4px',display:'flex',gap:10}}>
              <div className="stat-card" style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}}>Trips</div>
                <div style={{fontFamily:'Syne',fontWeight:800,fontSize:22}}>{sessions.length}</div>
              </div>
              <div className="stat-card" style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}}>All-Time</div>
                <div style={{fontFamily:'Syne',fontWeight:800,fontSize:22,color:'var(--brand)'}}>${allTime.toFixed(0)}</div>
              </div>
              <div className="stat-card" style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:4}}>Avg/Trip</div>
                <div style={{fontFamily:'Syne',fontWeight:800,fontSize:22}}>${(allTime/sessions.length).toFixed(0)}</div>
              </div>
            </div>

            {/* Month filter chips */}
            <div style={{padding:'12px 16px 4px'}}>
              <div style={{fontSize:11,fontWeight:700,color:'var(--text-3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:8}}>Filter by Month</div>
              <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:6,scrollbarWidth:'none'}}>
                <button
                  onClick={()=>setHistoryFilter('all')}
                  style={{
                    padding:'7px 16px', borderRadius:999, border:'none', cursor:'pointer', whiteSpace:'nowrap',
                    fontFamily:'DM Sans', fontSize:13, fontWeight:600, flexShrink:0, transition:'all .15s',
                    background: historyFilter==='all' ? 'var(--brand)' : 'var(--surface-3)',
                    color: historyFilter==='all' ? '#fff' : 'var(--text-2)',
                    boxShadow: historyFilter==='all' ? '0 2px 8px rgba(34,197,94,.35)' : 'none',
                  }}
                >All</button>
                {sortedKeys.map(k => (
                  <button
                    key={k}
                    onClick={()=>setHistoryFilter(k)}
                    style={{
                      padding:'7px 16px', borderRadius:999, border:'none', cursor:'pointer', whiteSpace:'nowrap',
                      fontFamily:'DM Sans', fontSize:13, fontWeight:600, flexShrink:0, transition:'all .15s',
                      background: historyFilter===k ? 'var(--brand)' : 'var(--surface-3)',
                      color: historyFilter===k ? '#fff' : 'var(--text-2)',
                      boxShadow: historyFilter===k ? '0 2px 8px rgba(34,197,94,.35)' : 'none',
                    }}
                  >{groups[k].label}</button>
                ))}
              </div>
            </div>

            {/* Filter summary row */}
            {historyFilter !== 'all' && (
              <div style={{padding:'4px 16px 8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                <span style={{fontSize:13,color:'var(--text-2)'}}>
                  {visibleSessions.length} trip{visibleSessions.length!==1?'s':''} this month
                </span>
                <span style={{fontFamily:'Syne',fontWeight:800,fontSize:15,color:'var(--brand)'}}>${filteredTotal.toFixed(2)}</span>
              </div>
            )}

            {/* Session list */}
            {filteredGroups.length === 0 ? (
              <div className="empty-state" style={{paddingTop:40}}>
                <div className="empty-icon">🔍</div>
                <div style={{fontFamily:'Syne',fontWeight:700,fontSize:16}}>No trips found</div>
                <div style={{color:'var(--text-2)',fontSize:13}}>Try a different month</div>
              </div>
            ) : filteredGroups.map(({k,label,list}) => (
              <div key={k}>
                {historyFilter === 'all' && <div className="month-label">{label}</div>}
                {list.map(s => (
                  <div key={s.id} className="history-card slide-right">
                    <div className="history-icon">🏪</div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s.storeName}</div>
                      <div style={{fontSize:12,color:'var(--text-2)',marginTop:2}}>{s.items.length} items • {new Date(s.dateTime).toLocaleDateString()}</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontFamily:'Syne',fontWeight:800,color:'var(--brand)',fontSize:16}}>${s.totalAmount.toFixed(2)}</div>
                      <div style={{display:'flex',gap:6,justifyContent:'flex-end',marginTop:6}}>
                        <button onClick={()=>setReceipt(s)} style={{padding:'4px 10px',borderRadius:999,background:'#dbeafe',color:'#1d4ed8',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}>View</button>
                        <button
                          onClick={()=>setConfirm({
                            title:'Delete trip?',
                            body:`Delete the trip to "${s.storeName}" on ${new Date(s.dateTime).toLocaleDateString()}? This can't be undone.`,
                            confirmLabel:'Delete',
                            onConfirm:()=>{ setConfirm(null); deleteSession(s.id); }
                          })}
                          style={{padding:'4px 10px',borderRadius:999,background:'#fee2e2',color:'var(--danger)',border:'none',fontSize:11,fontWeight:600,cursor:'pointer'}}
                        >Delete</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </>
        )}
      </div>
    );
  };

  // ── Analytics Tab ────────────────────
  const renderAnalytics = () => (
    <div style={{padding:'16px 16px 80px'}} className="fade-up">
      <div style={{marginBottom:20}}>
        <h2 style={{fontFamily:'Syne',fontWeight:800,fontSize:22,margin:'0 0 4px'}}>Spending Insights</h2>
        <p style={{color:'var(--text-2)',fontSize:14,margin:0}}>Powered by your saved trips</p>
      </div>
      {sessions.length === 0 ? (
        <div className="empty-state" style={{background:'var(--surface-2)',borderRadius:'var(--radius-lg)',padding:'48px 24px'}}>
          <div className="empty-icon">📊</div>
          <div style={{fontFamily:'Syne',fontWeight:700,fontSize:17}}>No data yet</div>
          <div style={{color:'var(--text-2)',fontSize:14}}>Save grocery trips to unlock insights</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div className="stat-card">
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,marginBottom:14}}>📅 Monthly Spending</div>
            <canvas id="mChart" height={170}></canvas>
          </div>
          <div className="stat-card">
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,marginBottom:14}}>🏪 By Store</div>
            <canvas id="sChart" height={170}></canvas>
          </div>
          <div className="stat-card">
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15,marginBottom:14}}>🔝 Top Items</div>
            <canvas id="pChart" height={200}></canvas>
          </div>
        </div>
      )}
    </div>
  );

  // ── Compare Tab ──────────────────────
  const renderCompare = () => {
    // Build map: normalizedItemName → { storeName → [prices] }
    const itemStoreMap = {};
    sessions.forEach(s => {
      s.items.forEach(it => {
        const key = it.name.trim().toLowerCase();
        if (!itemStoreMap[key]) itemStoreMap[key] = { displayName: it.name.trim(), stores: {} };
        if (!itemStoreMap[key].stores[s.storeName]) itemStoreMap[key].stores[s.storeName] = [];
        itemStoreMap[key].stores[s.storeName].push(it.price);
      });
    });

    // Only keep items found in 2+ different stores
    const comparable = Object.values(itemStoreMap)
      .filter(entry => Object.keys(entry.stores).length >= 2)
      .map(entry => {
        const storeEntries = Object.entries(entry.stores).map(([store, prices]) => ({
          store,
          avgPrice: prices.reduce((a,b)=>a+b,0) / prices.length,
          minPrice: Math.min(...prices),
          maxPrice: Math.max(...prices),
          appearances: prices.length,
        }));
        storeEntries.sort((a,b) => a.avgPrice - b.avgPrice);
        const cheapest = storeEntries[0].store;
        const priceDiff = storeEntries[storeEntries.length-1].avgPrice - storeEntries[0].avgPrice;
        const savingsPct = ((priceDiff / storeEntries[storeEntries.length-1].avgPrice) * 100).toFixed(0);
        return { ...entry, storeEntries, cheapest, priceDiff, savingsPct };
      })
      .sort((a,b) => b.priceDiff - a.priceDiff); // biggest savings first

    // All stores that appear in comparisons
    const allCompareStores = [...new Set(comparable.flatMap(c => c.storeEntries.map(e => e.store)))];

    const filtered = comparable.filter(c => {
      const matchSearch = !compareSearch || c.displayName.toLowerCase().includes(compareSearch.toLowerCase());
      const matchStore = compareStore === 'all' || c.storeEntries.some(e => e.store === compareStore);
      return matchSearch && matchStore;
    });

    // Color scale for store bars
    const BAR_COLORS = ['#22c55e','#3b82f6','#f59e0b','#ec4899','#8b5cf6','#06b6d4'];
    const storeColorMap = {};
    allCompareStores.forEach((s,i) => { storeColorMap[s] = BAR_COLORS[i % BAR_COLORS.length]; });

    return (
      <div style={{paddingBottom:90}} className="fade-up">
        {/* Header */}
        <div style={{padding:'18px 16px 0'}}>
          <h2 style={{fontFamily:'Syne',fontWeight:800,fontSize:22,margin:'0 0 4px'}}>⚖️ Price Compare</h2>
          <p style={{color:'var(--text-2)',fontSize:13,margin:'0 0 14px',lineHeight:1.5}}>
            Items bought at multiple stores — see who's cheaper
          </p>
        </div>

        {sessions.length < 2 || comparable.length === 0 ? (
          <div style={{margin:'16px',background:'var(--surface-2)',borderRadius:'var(--radius-lg)',padding:'48px 24px',textAlign:'center'}}>
            <div style={{fontSize:48,marginBottom:12}}>⚖️</div>
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:17,marginBottom:6}}>
              {sessions.length < 2 ? 'Need more trips' : 'No shared items yet'}
            </div>
            <div style={{color:'var(--text-2)',fontSize:13,lineHeight:1.6}}>
              {sessions.length < 2
                ? 'Save at least 2 grocery trips from different stores to compare prices.'
                : 'Buy the same item at 2 or more different stores and it will appear here.'}
            </div>
          </div>
        ) : (
          <>
            {/* Summary banner */}
            <div style={{margin:'0 16px 14px',background:'linear-gradient(135deg,#dcfce7,#bbf7d0)',borderRadius:'var(--radius)',padding:'14px 16px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div className="dark" style={{color:'#14532d'}}>
                <div style={{fontFamily:'Syne',fontWeight:800,fontSize:22,color:'#15803d'}}>{comparable.length}</div>
                <div style={{fontSize:12,fontWeight:600,color:'#166534'}}>items compared</div>
              </div>
              <div style={{textAlign:'center'}}>
                <div style={{fontFamily:'Syne',fontWeight:800,fontSize:22,color:'#15803d'}}>{allCompareStores.length}</div>
                <div style={{fontSize:12,fontWeight:600,color:'#166534'}}>stores tracked</div>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'Syne',fontWeight:800,fontSize:22,color:'#15803d'}}>
                  ${comparable.reduce((s,c)=>s+c.priceDiff,0).toFixed(2)}
                </div>
                <div style={{fontSize:12,fontWeight:600,color:'#166534'}}>max potential savings</div>
              </div>
            </div>

            {/* Search */}
            <div style={{padding:'0 16px 10px'}}>
              <input
                className="field"
                type="text"
                placeholder="🔍  Search item..."
                value={compareSearch}
                onChange={e=>setCompareSearch(e.target.value)}
                style={{fontSize:14,padding:'10px 14px'}}
              />
            </div>

            {/* Store filter chips */}
            {allCompareStores.length > 1 && (
              <div style={{padding:'0 16px 12px'}}>
                <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4,scrollbarWidth:'none'}}>
                  <button
                    onClick={()=>setCompareStore('all')}
                    style={{padding:'6px 14px',borderRadius:999,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,flexShrink:0,fontFamily:'DM Sans',
                      background:compareStore==='all'?'var(--brand)':'var(--surface-3)',
                      color:compareStore==='all'?'#fff':'var(--text-2)',
                      boxShadow:compareStore==='all'?'0 2px 8px rgba(34,197,94,.3)':'none',
                    }}>All Stores</button>
                  {allCompareStores.map(st=>(
                    <button key={st} onClick={()=>setCompareStore(st)}
                      style={{padding:'6px 14px',borderRadius:999,border:`2px solid ${storeColorMap[st]}22`,cursor:'pointer',fontSize:12,fontWeight:600,flexShrink:0,fontFamily:'DM Sans',whiteSpace:'nowrap',
                        background:compareStore===st ? storeColorMap[st] : `${storeColorMap[st]}18`,
                        color:compareStore===st?'#fff':storeColorMap[st],
                      }}>🏪 {st}</button>
                  ))}
                </div>
              </div>
            )}

            {/* Item cards */}
            {filtered.length === 0 ? (
              <div className="empty-state" style={{paddingTop:32}}>
                <div className="empty-icon">🔍</div>
                <div style={{fontFamily:'Syne',fontWeight:700,fontSize:15}}>No matches</div>
                <div style={{color:'var(--text-2)',fontSize:13}}>Try a different search</div>
              </div>
            ) : filtered.map((item, idx) => {
              const maxPrice = Math.max(...item.storeEntries.map(e=>e.avgPrice));
              return (
                <div key={item.displayName} className="fade-up" style={{animationDelay:`${idx*40}ms`,margin:'0 16px 12px',background:'var(--surface)',border:'1px solid var(--border)',borderRadius:'var(--radius)',boxShadow:'var(--shadow-sm)',overflow:'hidden'}}>
                  {/* Card header */}
                  <div style={{padding:'14px 16px 10px',display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontFamily:'Syne',fontWeight:800,fontSize:16,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{item.displayName}</div>
                      <div style={{fontSize:12,color:'var(--text-2)',marginTop:2}}>Compared across {item.storeEntries.length} stores</div>
                    </div>
                    {item.priceDiff > 0 && (
                      <div style={{background:'#dcfce7',color:'#15803d',borderRadius:999,padding:'4px 10px',fontSize:11,fontWeight:700,flexShrink:0,whiteSpace:'nowrap'}}>
                        Save ${item.priceDiff.toFixed(2)} · {item.savingsPct}%
                      </div>
                    )}
                  </div>

                  {/* Store rows with bar chart */}
                  <div style={{padding:'4px 16px 14px',display:'flex',flexDirection:'column',gap:10}}>
                    {item.storeEntries.map((e, si) => {
                      const barPct = maxPrice > 0 ? (e.avgPrice / maxPrice) * 100 : 100;
                      const isCheapest = e.store === item.cheapest;
                      const color = storeColorMap[e.store] || '#22c55e';
                      return (
                        <div key={e.store}>
                          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:5}}>
                            <div style={{display:'flex',alignItems:'center',gap:6}}>
                              <div style={{width:8,height:8,borderRadius:999,background:color,flexShrink:0}}/>
                              <span style={{fontSize:13,fontWeight:600,color:'var(--text-1)'}}>{e.store}</span>
                              {isCheapest && (
                                <span style={{background:'#dcfce7',color:'#15803d',borderRadius:999,padding:'2px 8px',fontSize:10,fontWeight:700}}>✓ Cheapest</span>
                              )}
                              {e.appearances > 1 && (
                                <span style={{color:'var(--text-3)',fontSize:11}}>{e.appearances}×</span>
                              )}
                            </div>
                            <div style={{fontFamily:'Syne',fontWeight:800,fontSize:15,color: isCheapest ? '#15803d' : 'var(--text-1)'}}>
                              ${e.avgPrice.toFixed(2)}
                              {e.minPrice !== e.maxPrice && (
                                <span style={{fontFamily:'DM Sans',fontWeight:400,fontSize:11,color:'var(--text-3)',marginLeft:4}}>avg</span>
                              )}
                            </div>
                          </div>
                          {/* Price bar */}
                          <div style={{height:6,background:'var(--surface-3)',borderRadius:999,overflow:'hidden'}}>
                            <div style={{height:'100%',width:`${barPct}%`,background: isCheapest ? color : `${color}88`,borderRadius:999,transition:'width .6s cubic-bezier(.22,1,.36,1)'}} />
                          </div>
                          {e.minPrice !== e.maxPrice && (
                            <div style={{fontSize:10,color:'var(--text-3)',marginTop:3}}>
                              Range: ${e.minPrice.toFixed(2)} – ${e.maxPrice.toFixed(2)}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* Footer: verdict */}
                  <div style={{borderTop:'1px solid var(--border)',padding:'10px 16px',background:'var(--surface-2)',display:'flex',alignItems:'center',gap:6}}>
                    <span style={{fontSize:14}}>🏆</span>
                    <span style={{fontSize:13,color:'var(--text-2)'}}>Best price at</span>
                    <span style={{fontSize:13,fontWeight:700,color:'var(--text-1)'}}>{item.cheapest}</span>
                    <span style={{fontSize:13,color:'var(--text-2)'}}>·</span>
                    <span style={{fontFamily:'Syne',fontWeight:800,fontSize:14,color:'#15803d'}}>${item.storeEntries[0].avgPrice.toFixed(2)}</span>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    );
  };

  // ── Bottom Nav ───────────────────────
  const navItems = [
    { id:'shopping', icon:'🛒', label:'Shop' },
    { id:'history',  icon:'📁', label:'History' },
    { id:'analytics',icon:'📈', label:'Stats' },
    { id:'compare',  icon:'⚖️', label:'Compare' },
  ];

  return (
    <div style={{minHeight:'100vh',background:'var(--surface)'}}>
      {/* Top bar */}
      <div className="top-bar">
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:24}}>🛡️</span>
          <h1 style={{fontFamily:'Syne',fontWeight:800,fontSize:22,margin:0,background:'linear-gradient(135deg,var(--brand),var(--brand-dark))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>GroceryGuard</h1>
        </div>
        <button
          onClick={()=>setDark(!dark)}
          style={{width:36,height:36,borderRadius:999,background:'var(--surface-3)',border:'none',cursor:'pointer',fontSize:17,display:'flex',alignItems:'center',justifyContent:'center',transition:'background .2s'}}
        >{dark?'☀️':'🌙'}</button>
      </div>

      {/* Tab content */}
      <div style={{paddingBottom: sessionOn && tab==='shopping' ? 0 : 80}}>
        {tab==='shopping'  && renderShopping()}
        {tab==='history'   && renderHistory()}
        {tab==='analytics' && renderAnalytics()}
        {tab==='compare'   && renderCompare()}
      </div>

      {/* Bottom nav */}
      <nav className="bottom-nav">
        {navItems.map(n => (
          <button key={n.id} className={`nav-btn${tab===n.id?' active':''}`} onClick={()=>setTab(n.id)} style={{position:'relative'}}>
            <span className="icon">{n.icon}</span>
            <span>{n.label}</span>
            {n.id==='shopping' && items.length > 0 && <span className="badge">{items.length}</span>}
          </button>
        ))}
      </nav>

      <ItemModal isOpen={modalOpen} onClose={()=>{setModalOpen(false);setEditIdx(null);}} onSave={addOrUpdate} initialItem={editIdx!==null?items[editIdx]:null} />
      <ReceiptModal session={receipt} onClose={()=>setReceipt(null)} />

      {confirm && (
        <div className="modal-overlay" onClick={()=>{ const fn = confirm.onCancel || (()=>setConfirm(null)); fn(); }}>
          <div onClick={e=>e.stopPropagation()}>
            <ConfirmDialog
              {...confirm}
              onCancel={() => { const fn = confirm.onCancel || (()=>{}); setConfirm(null); fn(); }}
            />
          </div>
        </div>
      )}

      <Toast msg={toast} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Service worker
if ('serviceWorker' in navigator && !window._swReg) {
  window._swReg = true;
  const sw = `self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));self.addEventListener('fetch',e=>e.respondWith(fetch(e.request).catch(()=>caches.match(e.request))));`;
  const blob = new Blob([sw],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
</body>
</html>
