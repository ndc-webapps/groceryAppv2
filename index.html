<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#16a34a" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b1220" media="(prefers-color-scheme: dark)">
  <meta name="description" content="GroceryGuard — track grocery spending in real time and stay on budget.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>GroceryGuard — Smart Budget Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  <script>window.generateId = () => `${Date.now()}-${Math.random().toString(36).slice(2, 9)}`;</script>
  <style>
    :root {
      /* Brand */
      --brand: #16a34a;
      --brand-strong: #15803d;
      --brand-soft: #dcfce7;
      --brand-rgb: 22,163,74;
      --accent: #f59e0b;

      /* Surfaces */
      --surface: #ffffff;
      --surface-2: #f6f8fa;
      --surface-3: #eef1f5;
      --border: #e6e9ef;
      --border-strong: #d3d8e0;

      /* Text */
      --text-1: #0b1220;
      --text-2: #5a6473;
      --text-3: #97a0ae;

      /* Semantic (theme-aware) */
      --success-bg: #ecfdf3;  --success-text: #15803d;  --success-border: #c7f0d8;
      --danger: #ef4444;      --danger-bg: #fef2f2;     --danger-text: #dc2626;  --danger-border: #fbd5d5;
      --info-bg: #eff5ff;     --info-text: #2563eb;     --info-border: #d4e2fd;
      --warn-bg: #fffaeb;     --warn-text: #b45309;     --warn-border: #fce7b5;

      /* Elevation */
      --shadow-sm: 0 1px 2px rgba(15,23,42,.04), 0 1px 3px rgba(15,23,42,.05);
      --shadow-md: 0 2px 8px rgba(15,23,42,.05), 0 10px 24px rgba(15,23,42,.07);
      --shadow-lg: 0 4px 12px rgba(15,23,42,.07), 0 18px 48px rgba(15,23,42,.12);
      --shadow-brand: 0 6px 18px rgba(var(--brand-rgb),.32);

      /* Radius */
      --r-sm: 10px;
      --r-md: 14px;
      --r-lg: 20px;
      --r-xl: 28px;

      /* Metrics */
      --nav-h: 64px;
      --app-max: 480px;

      /* Motion */
      --ease: cubic-bezier(.22,1,.36,1);
      --ease-spring: cubic-bezier(.34,1.56,.64,1);
    }
    .dark {
      --brand: #34d399;
      --brand-strong: #6ee7b7;
      --brand-soft: rgba(52,211,153,.14);
      --brand-rgb: 52,211,153;
      --accent: #fbbf24;

      --surface: #0f1623;
      --surface-2: #0b1018;
      --surface-3: #1b2433;
      --border: #222c3c;
      --border-strong: #2c3850;

      --text-1: #f1f5f9;
      --text-2: #9aa6b8;
      --text-3: #61708a;

      --success-bg: rgba(52,211,153,.13); --success-text: #34d399; --success-border: rgba(52,211,153,.28);
      --danger: #f87171;  --danger-bg: rgba(248,113,113,.13); --danger-text: #f87171; --danger-border: rgba(248,113,113,.28);
      --info-bg: rgba(96,165,250,.13);    --info-text: #60a5fa;  --info-border: rgba(96,165,250,.28);
      --warn-bg: rgba(251,191,36,.13);    --warn-text: #fbbf24;  --warn-border: rgba(251,191,36,.28);

      --shadow-sm: 0 1px 2px rgba(0,0,0,.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,.5);
      --shadow-lg: 0 12px 44px rgba(0,0,0,.6);
      --shadow-brand: 0 6px 18px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
    body {
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      background: var(--surface-2);
      color: var(--text-1);
      margin: 0;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      transition: background .35s var(--ease), color .35s var(--ease);
      overscroll-behavior-y: none;
    }
    h1,h2,h3,h4 { font-family: 'Syne', sans-serif; letter-spacing: -.01em; }
    button { font-family: inherit; }
    #root {
      max-width: var(--app-max);
      margin: 0 auto;
      position: relative;
      min-height: 100dvh;
      background: var(--surface);
    }
    @media (min-width: 481px) {
      #root { box-shadow: var(--shadow-lg); }
      body { padding: 0; }
    }

    /* ── Boot splash (shown before React mounts) ── */
    #boot {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; background: var(--surface);
      transition: opacity .4s var(--ease);
    }
    #boot .logo {
      width: 68px; height: 68px; border-radius: 22px;
      background: linear-gradient(140deg, #22c55e, #15803d);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; box-shadow: 0 12px 30px rgba(22,163,74,.4);
      animation: bootPop .6s var(--ease-spring) both;
    }
    #boot .name { font-family: 'Syne'; font-weight: 800; font-size: 20px; letter-spacing: -.02em; color: var(--text-1); }
    #boot .spin {
      width: 26px; height: 26px; border-radius: 50%;
      border: 3px solid var(--surface-3); border-top-color: var(--brand);
      animation: spin .7s linear infinite;
    }
    @keyframes bootPop { from { transform: scale(.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Animations ── */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(.96); } to { opacity: 1; transform: scale(1); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes shimmer { 0% { background-position: -480px 0; } 100% { background-position: 480px 0; } }
    @keyframes pulseRing { 0% { box-shadow: 0 0 0 0 rgba(var(--brand-rgb),.35); } 70% { box-shadow: 0 0 0 14px rgba(var(--brand-rgb),0); } 100% { box-shadow: 0 0 0 0 rgba(var(--brand-rgb),0); } }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes toastIn { from { opacity: 0; transform: translate(-50%, 16px) scale(.96); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }
    @keyframes bounceIn { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.12); opacity: 1; } 100% { transform: scale(1); } }

    .fade-up { animation: fadeUp .42s var(--ease) both; }
    .scale-in { animation: scaleIn .24s var(--ease) both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; scroll-behavior: auto !important; }
    }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%;
      min-height: 50px;
      padding: 14px 18px;
      border-radius: var(--r-md);
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      box-shadow: var(--shadow-brand);
      transition: transform .14s var(--ease), box-shadow .2s var(--ease), opacity .2s;
      letter-spacing: .2px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    .dark .btn-primary { color: #04140b; }
    .btn-primary:active { transform: scale(.97); }
    .btn-primary:disabled { opacity: .45; cursor: not-allowed; box-shadow: none; }
    .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626) !important; box-shadow: 0 6px 18px rgba(239,68,68,.32) !important; color:#fff !important; }

    .btn-ghost {
      min-height: 50px;
      padding: 14px 18px;
      border-radius: var(--r-md);
      background: var(--surface-3);
      color: var(--text-2);
      font-size: 14px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: background .15s, transform .14s var(--ease);
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-ghost:active { transform: scale(.97); background: var(--border); }

    /* Icon button — always ≥44px touch */
    .icon-btn {
      width: 44px; height: 44px;
      display: inline-flex; align-items: center; justify-content: center;
      border-radius: var(--r-sm);
      background: var(--surface-3);
      border: none; cursor: pointer;
      color: var(--text-2); font-size: 17px;
      transition: background .15s, transform .14s var(--ease);
    }
    .icon-btn:active { transform: scale(.9); background: var(--border); }

    /* ── Inputs ── */
    .field {
      width: 100%;
      min-height: 50px;
      padding: 13px 15px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      background: var(--surface-2);
      color: var(--text-1);
      font-family: 'DM Sans', sans-serif;
      font-size: 16px; /* ≥16px stops iOS zoom-on-focus */
      transition: border-color .18s, box-shadow .18s, background .18s;
      -webkit-appearance: none;
    }
    .field:focus {
      outline: none;
      border-color: var(--brand);
      background: var(--surface);
      box-shadow: 0 0 0 4px rgba(var(--brand-rgb),.13);
    }
    .field.invalid { border-color: var(--danger); box-shadow: 0 0 0 4px rgba(239,68,68,.12); }
    .field::placeholder { color: var(--text-3); }
    .label {
      display: block; font-size: 12px; font-weight: 700; color: var(--text-2);
      text-transform: uppercase; letter-spacing: .5px; margin-bottom: 7px;
    }
    .err-text { color: var(--danger-text); font-size: 12.5px; font-weight: 500; margin-top: 6px; }

    /* ── Cards ── */
    .surface-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
    }
    .item-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-sm);
      transition: box-shadow .2s, transform .14s var(--ease);
      position: relative;
      overflow: hidden;
    }
    .item-card:active { transform: scale(.985); }
    .item-card::before {
      content: ''; position: absolute; left: 0; top: 10px; bottom: 10px;
      width: 3px; border-radius: 0 3px 3px 0;
      background: linear-gradient(to bottom, var(--brand), var(--brand-strong));
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      padding: 15px 16px;
      box-shadow: var(--shadow-sm);
    }

    /* ── Pills & chips ── */
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 999px;
      font-size: 12px; font-weight: 600; line-height: 1.4;
    }
    .chip {
      min-height: 40px;
      padding: 9px 15px; border-radius: 999px;
      background: var(--surface-2); border: 1px solid var(--border);
      font-size: 13.5px; font-weight: 600; color: var(--text-2);
      cursor: pointer; white-space: nowrap;
      transition: background .15s, border-color .15s, color .15s, transform .14s var(--ease);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .chip:active { transform: scale(.95); }
    .chip.on { background: var(--brand); border-color: var(--brand); color: #fff; box-shadow: 0 3px 10px rgba(var(--brand-rgb),.3); }
    .dark .chip.on { color: #04140b; }
    .sug-chip {
      min-height: 36px;
      padding: 7px 13px; border-radius: 999px;
      background: var(--surface-3); border: 1px solid var(--border);
      font-size: 13px; font-weight: 600; color: var(--text-2);
      cursor: pointer; transition: background .15s, transform .14s var(--ease);
    }
    .sug-chip:active { transform: scale(.94); background: var(--brand-soft); }
    .hide-scroll { scrollbar-width: none; -ms-overflow-style: none; }
    .hide-scroll::-webkit-scrollbar { display: none; }

    /* ── Budget bar ── */
    .bar-track { height: 8px; background: var(--surface-3); border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width .6s var(--ease), background .3s; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }

    /* ── Top bar ── */
    .top-bar {
      position: sticky; top: 0; z-index: 30;
      background: color-mix(in srgb, var(--surface) 82%, transparent);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      padding-top: max(12px, env(safe-area-inset-top));
      display: flex; align-items: center; justify-content: space-between;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: var(--app-max);
      background: color-mix(in srgb, var(--surface) 86%, transparent);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      backdrop-filter: saturate(180%) blur(16px);
      border-top: 1px solid var(--border);
      display: flex; z-index: 40;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-btn {
      flex: 1; min-height: 56px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 8px 0 6px; gap: 3px;
      cursor: pointer; background: none; border: none;
      color: var(--text-3); font-size: 11px; font-weight: 600;
      transition: color .2s;
      position: relative;
    }
    .nav-btn .ic {
      font-size: 21px; line-height: 1;
      transition: transform .26s var(--ease-spring);
    }
    .nav-btn.active { color: var(--brand); }
    .nav-btn.active .ic { transform: translateY(-2px) scale(1.12); }
    .nav-btn.active::after {
      content: ''; position: absolute; top: 6px; width: 5px; height: 5px;
      border-radius: 999px; background: var(--brand);
    }

    /* ── FAB ── */
    .fab {
      position: fixed; right: max(18px, env(safe-area-inset-right));
      width: 60px; height: 60px; border-radius: 20px;
      background: linear-gradient(135deg, var(--brand), var(--brand-strong));
      color: #fff; font-size: 28px; font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--shadow-brand);
      border: none; cursor: pointer; z-index: 35;
      transition: transform .16s var(--ease-spring), box-shadow .2s;
    }
    .fab:active { transform: scale(.88) rotate(90deg); }

    /* ── Summary bar ── */
    .summary-bar {
      position: fixed; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: var(--app-max);
      background: color-mix(in srgb, var(--surface) 92%, transparent);
      -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      z-index: 25; padding: 13px 18px 12px;
      box-shadow: 0 -8px 24px rgba(15,23,42,.05);
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(8,12,20,.5);
      -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px);
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeUp .2s ease both;
    }
    @media (min-width: 481px) { .modal-overlay { align-items: center; padding: 20px; } }
    .modal-sheet {
      background: var(--surface);
      width: 100%; max-width: var(--app-max);
      border-radius: var(--r-xl) var(--r-xl) 0 0;
      padding: 12px 22px calc(26px + env(safe-area-inset-bottom));
      animation: slideUp .32s var(--ease) both;
      max-height: 92vh; overflow-y: auto;
    }
    @media (min-width: 481px) {
      .modal-sheet { border-radius: var(--r-xl); padding: 26px 26px 30px; max-height: 86vh; animation: scaleIn .24s var(--ease) both; }
    }
    .modal-handle { width: 40px; height: 4px; background: var(--border-strong); border-radius: 999px; margin: 0 auto 16px; }
    .confirm-modal {
      background: var(--surface); border-radius: var(--r-xl);
      padding: 26px 24px calc(24px + env(safe-area-inset-bottom));
      max-width: 340px; width: calc(100% - 40px); margin: 0 20px;
      box-shadow: var(--shadow-lg);
      animation: scaleIn .24s var(--ease-spring) both;
    }

    /* ── Swipe to delete ── */
    .swipe-wrap { position: relative; overflow: hidden; border-radius: var(--r-md); margin-bottom: 11px; }
    .swipe-bg {
      position: absolute; inset: 0; display: flex; align-items: center; justify-content: flex-end;
      padding-right: 24px; background: linear-gradient(90deg, transparent, var(--danger-bg));
      color: var(--danger-text); font-size: 20px; border-radius: var(--r-md);
    }
    .swipe-content { transition: transform .28s var(--ease-spring); will-change: transform; touch-action: pan-y; }

    /* ── Receipt ── */
    .receipt-line {
      display: flex; justify-content: space-between; align-items: center;
      padding: 11px 0; border-bottom: 1px dashed var(--border); font-size: 14px;
    }
    .receipt-line:last-child { border-bottom: none; }

    /* ── Empty state ── */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 56px 28px; text-align: center; gap: 8px; }
    .empty-icon {
      width: 84px; height: 84px; border-radius: 26px; margin-bottom: 6px;
      background: linear-gradient(140deg, var(--surface-3), var(--surface-2));
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center; font-size: 38px;
    }
    .empty-title { font-family: 'Syne'; font-weight: 700; font-size: 18px; }
    .empty-sub { color: var(--text-2); font-size: 14px; line-height: 1.5; max-width: 260px; }

    /* ── Skeleton ── */
    .skel {
      background: linear-gradient(90deg, var(--surface-3) 25%, var(--surface-2) 50%, var(--surface-3) 75%);
      background-size: 960px 100%;
      animation: shimmer 1.4s infinite linear;
      border-radius: 8px;
    }

    /* ── Start screen ── */
    .start-card {
      margin: 18px; padding: 28px 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r-xl); box-shadow: var(--shadow-md);
    }
    .hero-ring {
      width: 76px; height: 76px; border-radius: 24px; margin: 0 auto 16px;
      background: linear-gradient(140deg, var(--brand-soft), color-mix(in srgb, var(--brand) 22%, var(--surface)));
      display: flex; align-items: center; justify-content: center; font-size: 36px;
      box-shadow: inset 0 0 0 1px var(--border);
    }

    /* ── Section labels & cards ── */
    .month-label { font-family: 'Syne'; font-size: 12px; font-weight: 700; letter-spacing: .6px; text-transform: uppercase; color: var(--text-3); padding: 18px 20px 8px; }
    .history-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-md);
      padding: 14px 16px; margin: 0 16px 10px; box-shadow: var(--shadow-sm);
      display: flex; align-items: center; gap: 13px;
      transition: box-shadow .2s, transform .14s var(--ease);
    }
    .history-card:active { transform: scale(.99); }
    .tile-icon {
      width: 46px; height: 46px; border-radius: 13px; flex-shrink: 0;
      background: linear-gradient(140deg, var(--brand-soft), color-mix(in srgb, var(--brand) 16%, var(--surface)));
      display: flex; align-items: center; justify-content: center; font-size: 22px;
    }

    /* ── Toast ── */
    .toast-host {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
      z-index: 999; width: max-content; max-width: calc(100% - 32px);
      pointer-events: none;
    }
    .toast {
      pointer-events: auto;
      display: flex; align-items: center; gap: 10px;
      background: var(--text-1); color: var(--surface);
      padding: 12px 14px 12px 16px; border-radius: 14px;
      font-size: 14px; font-weight: 600; box-shadow: var(--shadow-lg);
      animation: toastIn .32s var(--ease-spring) both;
    }
    .toast .undo {
      pointer-events: auto; background: rgba(255,255,255,.16); color: var(--surface);
      border: none; border-radius: 9px; padding: 7px 12px; font-weight: 700; font-size: 13px;
      cursor: pointer; font-family: 'Syne'; min-height: 34px;
    }
  </style>
</head>
<body>
<div id="root">
  <div id="boot">
    <div class="logo">🛡️</div>
    <div class="name">GroceryGuard</div>
    <div class="spin"></div>
  </div>
</div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useMemo, useCallback } = React;

/* ───────────── Storage ───────────── */
const SK = { sessions: 'gg_sessions_v2', freq: 'gg_freq_v2', dark: 'gg_dark_v2', stores: 'gg_stores_v2' };
const load = (k, d) => { try { const r = localStorage.getItem(k); return r ? JSON.parse(r) : d; } catch { return d; } };
const save = (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} };

const updateFreq = (name) => {
  if (!name?.trim()) return;
  const f = load(SK.freq, {});
  const key = name.trim().toLowerCase();
  f[key] = { name: name.trim(), count: (f[key]?.count || 0) + 1 };
  save(SK.freq, f);
};

/* ───────────── Helpers ───────────── */
const money = (n) => '$' + (Number(n) || 0).toFixed(2);
const haptic = (ms = 8) => { try { navigator.vibrate && navigator.vibrate(ms); } catch {} };

// Load an external script once, on demand
const loadScript = (src) => new Promise((res, rej) => {
  if (document.querySelector(`script[data-dyn="${src}"]`)) return res();
  const s = document.createElement('script');
  s.src = src; s.dataset.dyn = src;
  s.onload = () => res(); s.onerror = () => rej(new Error('load failed'));
  document.head.appendChild(s);
});

// Pull the most likely price out of OCR text (prefers a decimal like 3.99, else a whole number)
const parsePrice = (text) => {
  const cleaned = (text || '').replace(/[^0-9.,\s]/g, ' ');
  const dec = cleaned.match(/\d{1,4}[.,]\d{2}/g) || [];
  const vals = dec.map(m => parseFloat(m.replace(',', '.'))).filter(v => v > 0 && v < 100000);
  if (vals.length) return Math.max(...vals);
  const ints = (cleaned.match(/\d{1,4}/g) || []).map(Number).filter(n => n > 0 && n < 100000);
  return ints.length ? Math.max(...ints) : null;
};

/* ───────────── Swipe-to-delete ───────────── */
const SwipeRow = ({ children, onDelete }) => {
  const ref = useRef(null);
  const sx = useRef(0), sy = useRef(0), dragging = useRef(false), locked = useRef(null);

  const set = (x) => { if (ref.current) ref.current.style.transform = `translateX(${x}px)`; };
  const onStart = e => { sx.current = e.touches[0].clientX; sy.current = e.touches[0].clientY; dragging.current = true; locked.current = null; if (ref.current) ref.current.style.transition = 'none'; };
  const onMove = e => {
    if (!dragging.current) return;
    const dx = e.touches[0].clientX - sx.current, dy = e.touches[0].clientY - sy.current;
    if (locked.current === null) locked.current = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
    if (locked.current !== 'x') return;
    if (dx < 0) set(Math.max(-96, dx));
  };
  const onEnd = e => {
    dragging.current = false;
    if (ref.current) ref.current.style.transition = '';
    const dx = e.changedTouches[0].clientX - sx.current;
    if (locked.current === 'x' && dx < -64) { set(-window.innerWidth); haptic(14); setTimeout(onDelete, 180); }
    else set(0);
  };
  return (
    <div className="swipe-wrap">
      <div className="swipe-bg">🗑️</div>
      <div ref={ref} className="swipe-content" onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}>{children}</div>
    </div>
  );
};

/* ───────────── Add / Edit modal ───────────── */
const ItemModal = ({ isOpen, onClose, onSave, initialItem, suggestIndex = {} }) => {
  const [name, setName] = useState('');
  const [qty, setQty] = useState('1');
  const [price, setPrice] = useState('');
  const [img, setImg] = useState('');
  const [errs, setErrs] = useState({});
  const [scan, setScan] = useState(null); // { type:'load'|'ok'|'err', text }
  const priceTouched = useRef(false);
  const fileRef = useRef();
  const scanRef = useRef();
  const nameRef = useRef();

  useEffect(() => {
    if (isOpen) {
      setName(initialItem?.name || '');
      setQty(initialItem ? String(initialItem.quantity) : '1');
      setPrice(initialItem ? String(initialItem.price) : '');
      setImg(initialItem?.imageBase64 || '');
      setErrs({});
      setScan(null);
      priceTouched.current = !!initialItem;
      setTimeout(() => nameRef.current?.focus(), 120);
    }
  }, [isOpen, initialItem]);

  // Camera price scanner (OCR via Tesseract.js, lazy-loaded on first use)
  const handleScan = async (e) => {
    const f = e.target.files[0]; e.target.value = '';
    if (!f) return;
    haptic();
    setScan({ type: 'load', text: 'Reading price…' });
    try {
      const dataUrl = await new Promise(res => { const r = new FileReader(); r.onloadend = () => res(r.result); r.readAsDataURL(f); });
      await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5.1.1/dist/tesseract.min.js');
      const worker = await Tesseract.createWorker('eng');
      await worker.setParameters({ tessedit_char_whitelist: '0123456789.,$ ' });
      const { data } = await worker.recognize(dataUrl);
      await worker.terminate();
      const p = parsePrice(data.text);
      if (p != null) {
        priceTouched.current = true; setPrice(String(p)); haptic(12);
        setScan({ type: 'ok', text: `Found ${money(p)} — double-check it` });
      } else { haptic(20); setScan({ type: 'err', text: "Couldn't read a price. Try a clearer, closer shot." }); }
    } catch (err) {
      setScan({ type: 'err', text: 'Scanner needs internet the first time. Try again.' });
    }
  };

  // Smart price memory — exact match on what you typed
  const intel = suggestIndex[name.trim().toLowerCase()] || null;

  const sugs = useMemo(() => {
    const f = name.trim().toLowerCase();
    if (intel && f) return []; // exact match → show the intel card instead of chips
    const all = Object.values(suggestIndex);
    const arr = f ? all.filter(i => i.name.toLowerCase().includes(f)) : all;
    return arr.sort((a, b) => b.count - a.count).slice(0, 5);
  }, [name, suggestIndex, intel]);

  // Auto-fill the last paid price when a known item is recognised (unless user typed their own)
  useEffect(() => {
    if (!isOpen || priceTouched.current) return;
    if (intel && intel.lastPrice != null) setPrice(String(intel.lastPrice));
  }, [intel, isOpen]);

  const handleImg = e => {
    const f = e.target.files[0];
    if (f) { const r = new FileReader(); r.onloadend = () => setImg(r.result); r.readAsDataURL(f); }
  };

  const handleSave = () => {
    const q = parseFloat(qty), p = parseFloat(price);
    const next = {};
    if (!name.trim()) next.name = 'Give the item a name';
    if (!q || q <= 0) next.qty = 'Must be more than 0';
    if (!p || p <= 0) next.price = 'Must be more than 0';
    setErrs(next);
    if (Object.keys(next).length) { haptic(20); return; }
    haptic(12);
    onSave({ id: initialItem?.id || generateId(), name: name.trim(), quantity: q, price: p, imageBase64: img || null });
    updateFreq(name.trim());
    onClose();
  };

  if (!isOpen) return null;
  const live = parseFloat(price) > 0 && parseFloat(qty) > 0;
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-sheet" onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 }}>
          <h3 style={{ fontWeight: 800, fontSize: 21, margin: 0 }}>{initialItem ? 'Edit item' : 'Add item'}</h3>
          <button className="icon-btn" onClick={onClose} aria-label="Close">✕</button>
        </div>

        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div>
            <label className="label">Item name</label>
            <input ref={nameRef} className={'field' + (errs.name ? ' invalid' : '')} type="text" value={name} onChange={e => { setName(e.target.value); setErrs(p => ({ ...p, name: null })); }} placeholder="e.g. Fresh Avocado" enterKeyHint="next" />
            {errs.name && <div className="err-text">{errs.name}</div>}
            {!intel && sugs.length > 0 && (
              <div style={{ display: 'flex', flexWrap: 'wrap', gap: 7, marginTop: 9 }}>
                {sugs.map(s => (
                  <button key={s.name} className="sug-chip" onClick={() => { haptic(); setName(s.name); if (!priceTouched.current && s.lastPrice != null) setPrice(String(s.lastPrice)); }}>
                    {s.name}{s.lastPrice != null && <span style={{ opacity: .55, marginLeft: 5, fontWeight: 700 }}>{money(s.lastPrice)}</span>}
                  </button>
                ))}
              </div>
            )}
            {intel && (() => {
              const pNow = parseFloat(price);
              const diff = pNow > 0 ? pNow - intel.lastPrice : 0;
              return (
                <div style={{ marginTop: 10, background: 'var(--surface-2)', border: '1px solid var(--border)', borderRadius: 'var(--r-md)', padding: '11px 13px', fontSize: 12.5 }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', color: 'var(--text-2)', fontWeight: 600 }}>
                    <span>📊 Bought {intel.count}×</span>
                    <span>Last paid {money(intel.lastPrice)}{intel.lastStore ? ` · ${intel.lastStore}` : ''}</span>
                  </div>
                  {intel.min != null && intel.min < intel.lastPrice && (
                    <div style={{ marginTop: 5, color: 'var(--success-text)', fontWeight: 600 }}>💚 Cheapest you found: {money(intel.min)}{intel.minStore ? ` at ${intel.minStore}` : ''}</div>
                  )}
                  {Math.abs(diff) > 0.009 && (
                    <div style={{ marginTop: 5, fontWeight: 700, color: diff > 0 ? 'var(--danger-text)' : 'var(--success-text)' }}>
                      {diff > 0 ? `↑ ${money(diff)} more than last time` : `↓ ${money(-diff)} cheaper than last time`}
                    </div>
                  )}
                </div>
              );
            })()}
          </div>

          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
            <div>
              <label className="label">Quantity</label>
              <input className={'field' + (errs.qty ? ' invalid' : '')} type="number" inputMode="decimal" step="0.5" min="0.5" value={qty} onChange={e => { setQty(e.target.value); setErrs(p => ({ ...p, qty: null })); }} />
              {errs.qty && <div className="err-text">{errs.qty}</div>}
            </div>
            <div>
              <label className="label">Price ($)</label>
              <input className={'field' + (errs.price ? ' invalid' : '')} type="number" inputMode="decimal" step="0.01" min="0.01" value={price} onChange={e => { priceTouched.current = true; setPrice(e.target.value); setErrs(p => ({ ...p, price: null })); }} placeholder="0.00" enterKeyHint="done" onKeyDown={e => e.key === 'Enter' && handleSave()} />
              {errs.price && <div className="err-text">{errs.price}</div>}
            </div>
          </div>

          {/* Camera price scanner */}
          <div>
            <input type="file" accept="image/*" capture="environment" ref={scanRef} onChange={handleScan} style={{ display: 'none' }} />
            <button className="btn-ghost" style={{ width: '100%', minHeight: 46, borderStyle: 'dashed', border: '1.5px dashed var(--border-strong)', background: 'var(--surface-2)' }} onClick={() => scanRef.current.click()} disabled={scan?.type === 'load'}>
              {scan?.type === 'load'
                ? <><span style={{ width: 16, height: 16, borderRadius: '50%', border: '2px solid var(--border)', borderTopColor: 'var(--brand)', display: 'inline-block', animation: 'spin .7s linear infinite' }} /> Reading price…</>
                : <>📷 Scan price tag</>}
            </button>
            {scan && scan.type !== 'load' && (
              <div className="err-text" style={{ color: scan.type === 'ok' ? 'var(--success-text)' : 'var(--danger-text)', fontWeight: 600 }}>
                {scan.type === 'ok' ? '✓ ' : '⚠ '}{scan.text}
              </div>
            )}
          </div>

          <div style={{ background: live ? 'var(--success-bg)' : 'var(--surface-3)', border: '1px solid', borderColor: live ? 'var(--success-border)' : 'var(--border)', borderRadius: 'var(--r-md)', padding: '12px 15px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', transition: 'background .2s' }}>
            <span style={{ color: 'var(--text-2)', fontSize: 14, fontWeight: 500 }}>Subtotal</span>
            <span style={{ fontFamily: 'Syne', fontWeight: 800, color: live ? 'var(--success-text)' : 'var(--text-3)', fontSize: 18 }}>{money(live ? parseFloat(price) * parseFloat(qty) : 0)}</span>
          </div>

          <div>
            <label className="label">Photo (optional)</label>
            <input type="file" accept="image/*" capture="environment" ref={fileRef} onChange={handleImg} style={{ display: 'none' }} />
            <div style={{ display: 'flex', gap: 12, alignItems: 'center' }}>
              <button className="btn-ghost" style={{ minHeight: 46 }} onClick={() => fileRef.current.click()}>📷 {img ? 'Change' : 'Add photo'}</button>
              {img && <img src={img} alt="preview" style={{ width: 56, height: 56, borderRadius: 13, objectFit: 'cover', border: '1px solid var(--border)' }} />}
              {img && <button className="icon-btn" style={{ width: 40, height: 40 }} onClick={() => setImg('')} aria-label="Remove photo">✕</button>}
            </div>
          </div>

          <div style={{ display: 'flex', gap: 10, paddingTop: 2 }}>
            <button className="btn-ghost" style={{ flex: 1 }} onClick={onClose}>Cancel</button>
            <button className="btn-primary" style={{ flex: 2 }} onClick={handleSave}>{initialItem ? 'Save changes' : 'Add to cart'}</button>
          </div>
        </div>
      </div>
    </div>
  );
};

/* ───────────── App ───────────── */
const App = () => {
  const [booting, setBooting] = useState(true);
  const [tab, setTab] = useState('shopping');
  const [storeName, setStoreName] = useState('');
  const [storeInput, setStoreInput] = useState('');
  const [items, setItems] = useState([]);
  const [budget, setBudget] = useState(0);
  const [budgetInput, setBudgetInput] = useState('');
  const [sessionOn, setSessionOn] = useState(false);
  const [modalOpen, setModalOpen] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [sessions, setSessions] = useState([]);
  const [receipt, setReceipt] = useState(null);
  const [dark, setDark] = useState(false);
  const [toast, setToast] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [historyFilter, setHistoryFilter] = useState('all');
  const [historySearch, setHistorySearch] = useState('');
  const [compareSearch, setCompareSearch] = useState('');
  const [compareStore, setCompareStore] = useState('all');

  const mChart = useRef(null), sChart = useRef(null), pChart = useRef(null);
  const toastTimer = useRef(null);
  const undoRef = useRef(null);

  const total = items.reduce((s, i) => s + i.quantity * i.price, 0);
  const totalQty = items.reduce((s, i) => s + i.quantity, 0);
  const remaining = budget - total;
  const pct = budget > 0 ? Math.min((total / budget) * 100, 100) : 0;
  const overBudget = budget > 0 && total > budget;
  const nearBudget = budget > 0 && remaining > 0 && remaining <= budget * 0.15;

  const showToast = useCallback((msg, opts = {}) => {
    clearTimeout(toastTimer.current);
    undoRef.current = opts.undo || null;
    setToast({ msg, type: opts.type || 'success', undo: !!opts.undo });
    toastTimer.current = setTimeout(() => setToast(null), opts.duration || (opts.undo ? 4500 : 2400));
  }, []);
  const runUndo = () => { clearTimeout(toastTimer.current); const fn = undoRef.current; setToast(null); fn && fn(); };

  // boot
  useEffect(() => {
    setSessions(load(SK.sessions, []));
    setDark(load(SK.dark, window.matchMedia('(prefers-color-scheme: dark)').matches));
    const t = setTimeout(() => {
      setBooting(false);
      const b = document.getElementById('boot');
      if (b) { b.style.opacity = '0'; setTimeout(() => b.remove(), 420); }
    }, 480);
    return () => clearTimeout(t);
  }, []);

  useEffect(() => { save(SK.dark, dark); document.documentElement.classList.toggle('dark', dark); }, [dark]);

  const recentStores = useMemo(() => load(SK.stores, []), [sessionOn, sessions]);

  // Smart memory: learn every item's price history from saved trips (cheapest store, last price, frequency)
  const itemIntel = useMemo(() => {
    const map = {};
    [...sessions].sort((a, b) => new Date(a.dateTime) - new Date(b.dateTime)).forEach(s => {
      s.items.forEach(it => {
        const k = it.name.trim().toLowerCase();
        if (!map[k]) map[k] = { display: it.name.trim(), count: 0, prices: [], lastPrice: 0, lastStore: '', lastQty: 1, min: Infinity, minStore: '' };
        const m = map[k];
        m.count += 1; m.prices.push(it.price);
        m.lastPrice = it.price; m.lastStore = s.storeName; m.lastQty = it.quantity;
        if (it.price < m.min) { m.min = it.price; m.minStore = s.storeName; }
      });
    });
    Object.values(map).forEach(m => { m.avg = m.prices.reduce((a, b) => a + b, 0) / m.prices.length; if (m.min === Infinity) m.min = null; });
    return map;
  }, [sessions]);

  // Merge price history with typed-name history → autocomplete index for the modal
  const suggestIndex = useMemo(() => {
    const idx = {};
    Object.values(load(SK.freq, {})).forEach(f => { idx[f.name.toLowerCase()] = { name: f.name, count: f.count, lastPrice: null }; });
    Object.values(itemIntel).forEach(m => {
      const k = m.display.toLowerCase();
      idx[k] = { name: m.display, count: Math.max(m.count, idx[k]?.count || 0), lastPrice: m.lastPrice, lastStore: m.lastStore, min: m.min, minStore: m.minStore };
    });
    return idx;
  }, [itemIntel]);

  const topItems = useMemo(() => Object.values(itemIntel).sort((a, b) => b.count - a.count).slice(0, 12), [itemIntel]);

  // One-tap add a known item at its last price; merges quantity if already in the cart
  const quickAdd = (it) => {
    haptic();
    setItems(prev => {
      const k = it.display.toLowerCase();
      const i = prev.findIndex(x => x.name.toLowerCase() === k);
      if (i >= 0) { const c = [...prev]; c[i] = { ...c[i], quantity: c[i].quantity + 1 }; return c; }
      return [...prev, { id: generateId(), name: it.display, quantity: 1, price: it.lastPrice, imageBase64: null }];
    });
    updateFreq(it.display);
    showToast(`Added ${it.display}`);
  };

  const startSession = () => {
    const name = storeInput.trim();
    if (!name) { showToast('Enter a store name first', { type: 'error' }); haptic(20); return; }
    haptic(12);
    setStoreName(name); setSessionOn(true); setItems([]); setBudget(0); setBudgetInput('');
    save(SK.stores, [name, ...load(SK.stores, []).filter(s => s !== name)].slice(0, 6));
  };

  const saveSession = () => {
    if (!storeName || items.length === 0) return;
    const s = { id: generateId(), storeName, dateTime: new Date().toISOString(), totalAmount: total, items: [...items] };
    const updated = [s, ...sessions];
    setSessions(updated); save(SK.sessions, updated);
    haptic([10, 30, 10]); showToast('Trip saved!');
    resetSession();
  };

  const resetSession = () => { setItems([]); setStoreName(''); setStoreInput(''); setSessionOn(false); setBudget(0); setBudgetInput(''); };

  const promptNewTrip = () => {
    if (items.length > 0) {
      setConfirm({ title: 'Start a new trip?', body: `You have ${items.length} item${items.length > 1 ? 's' : ''} in your cart. They'll be discarded.`, confirmLabel: 'Discard', onConfirm: () => { setConfirm(null); resetSession(); } });
    } else resetSession();
  };

  const addOrUpdate = (data) => {
    if (editIdx !== null) { const next = [...items]; next[editIdx] = data; setItems(next); setEditIdx(null); showToast('Item updated'); }
    else { setItems(p => [...p, data]); }
    setModalOpen(false);
  };

  const deleteItem = (i) => {
    const removed = items[i];
    setItems(items.filter((_, idx) => idx !== i));
    showToast(`Removed ${removed.name}`, { undo: () => setItems(prev => { const c = [...prev]; c.splice(i, 0, removed); return c; }) });
  };
  const editItem = (i) => { setEditIdx(i); setModalOpen(true); };

  const deleteSession = (id) => {
    const removed = sessions.find(s => s.id === id);
    const u = sessions.filter(s => s.id !== id);
    setSessions(u); save(SK.sessions, u);
    showToast('Trip deleted', { undo: () => { const restored = [removed, ...u].sort((a, b) => new Date(b.dateTime) - new Date(a.dateTime)); setSessions(restored); save(SK.sessions, restored); } });
  };

  // Analytics charts
  useEffect(() => {
    if (booting || tab !== 'analytics' || sessions.length === 0) return;
    const mm = new Map(), sm = new Map(), pm = new Map();
    sessions.forEach(s => {
      const d = new Date(s.dateTime);
      const mk = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      mm.set(mk, (mm.get(mk) || 0) + s.totalAmount);
      sm.set(s.storeName, (sm.get(s.storeName) || 0) + s.totalAmount);
      s.items.forEach(it => pm.set(it.name, (pm.get(it.name) || 0) + it.quantity));
    });
    const sorted = [...mm.keys()].sort();
    const mLabels = sorted.map(k => { const [y, m] = k.split('-'); return new Date(y, m - 1).toLocaleString('default', { month: 'short', year: '2-digit' }); });
    const mData = sorted.map(k => mm.get(k));
    const sLabels = [...sm.keys()], sData = sLabels.map(k => sm.get(k));
    const top = [...pm.entries()].sort((a, b) => b[1] - a[1]).slice(0, 5);
    const colors = ['#22c55e', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6'];
    const grid = dark ? 'rgba(255,255,255,.06)' : 'rgba(15,23,42,.06)';
    const fc = dark ? '#9aa6b8' : '#5a6473';
    const base = { responsive: true, maintainAspectRatio: true, plugins: { legend: { display: false } }, scales: { x: { grid: { display: false }, ticks: { color: fc, font: { family: 'DM Sans', size: 11 } } }, y: { grid: { color: grid }, ticks: { color: fc, font: { family: 'DM Sans', size: 11 }, callback: v => '$' + v } } } };
    [mChart, sChart, pChart].forEach(r => r.current && r.current.destroy());
    const c1 = document.getElementById('mChart')?.getContext('2d');
    const c2 = document.getElementById('sChart')?.getContext('2d');
    const c3 = document.getElementById('pChart')?.getContext('2d');
    if (c1) mChart.current = new Chart(c1, { type: 'bar', data: { labels: mLabels, datasets: [{ data: mData, backgroundColor: colors[0], borderRadius: 8, borderSkipped: false, maxBarThickness: 38 }] }, options: base });
    if (c2) sChart.current = new Chart(c2, { type: 'bar', data: { labels: sLabels, datasets: [{ data: sData, backgroundColor: colors[1], borderRadius: 8, borderSkipped: false, maxBarThickness: 38 }] }, options: base });
    if (c3) pChart.current = new Chart(c3, { type: 'doughnut', data: { labels: top.map(p => p[0]), datasets: [{ data: top.map(p => p[1]), backgroundColor: colors, borderWidth: 0, hoverOffset: 8 }] }, options: { responsive: true, maintainAspectRatio: true, cutout: '62%', plugins: { legend: { position: 'bottom', labels: { color: fc, font: { family: 'DM Sans', size: 12 }, padding: 14, usePointStyle: true } } } } });
    return () => [mChart, sChart, pChart].forEach(r => r.current && r.current.destroy());
  }, [tab, sessions, dark, booting]);

  /* ── Shopping ── */
  const renderShopping = () => {
    if (!sessionOn) {
      return (
        <div className="fade-up" style={{ paddingBottom: 100 }}>
          <div className="start-card">
            <div className="hero-ring">🛍️</div>
            <h2 style={{ fontWeight: 800, fontSize: 25, textAlign: 'center', margin: '0 0 6px' }}>New grocery trip</h2>
            <p style={{ color: 'var(--text-2)', textAlign: 'center', fontSize: 14.5, margin: '0 0 22px', lineHeight: 1.5 }}>Track spending live and stay on budget.</p>
            <label className="label">Store name</label>
            <input className="field" type="text" value={storeInput} onChange={e => setStoreInput(e.target.value)} placeholder="Whole Foods, Trader Joe's…" enterKeyHint="go" onKeyDown={e => e.key === 'Enter' && startSession()} />
            {recentStores.length > 0 && (
              <div style={{ marginTop: 18 }}>
                <div className="label" style={{ color: 'var(--text-3)' }}>Recent</div>
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
                  {recentStores.slice(0, 5).map(s => <button key={s} className="chip" onClick={() => { haptic(); setStoreInput(s); }}>📍 {s}</button>)}
                </div>
              </div>
            )}
            <button className="btn-primary" style={{ marginTop: 22 }} onClick={startSession}>Start trip →</button>
          </div>

          {sessions.length > 0 && (
            <div style={{ padding: '14px 20px 0' }}>
              <div className="label" style={{ color: 'var(--text-3)', marginBottom: 12 }}>Last trip</div>
              <div className="history-card" style={{ margin: 0, cursor: 'pointer' }} onClick={() => setReceipt(sessions[0])}>
                <div className="tile-icon">🏪</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontFamily: 'Syne', fontWeight: 700, fontSize: 15 }}>{sessions[0].storeName}</div>
                  <div style={{ fontSize: 13, color: 'var(--text-2)', marginTop: 2 }}>{sessions[0].items.length} items • {new Date(sessions[0].dateTime).toLocaleDateString()}</div>
                </div>
                <div style={{ fontFamily: 'Syne', fontWeight: 800, color: 'var(--brand)', fontSize: 16, flexShrink: 0 }}>{money(sessions[0].totalAmount)}</div>
              </div>
            </div>
          )}
        </div>
      );
    }

    return (
      <>
        <div style={{ position: 'sticky', top: 'calc(56px + env(safe-area-inset-top))', zIndex: 20, background: 'var(--surface)', borderBottom: '1px solid var(--border)', padding: '13px 18px' }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: budget > 0 || true ? 11 : 0 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
              <span style={{ fontSize: 17 }}>📍</span>
              <span style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 17, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{storeName}</span>
            </div>
            <button onClick={() => { haptic(); promptNewTrip(); }} style={{ background: 'var(--danger-bg)', border: '1px solid var(--danger-border)', color: 'var(--danger-text)', borderRadius: 999, padding: '7px 13px', fontSize: 12.5, fontWeight: 700, cursor: 'pointer', flexShrink: 0, minHeight: 36 }}>✕ End</button>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <input className="field" type="number" inputMode="decimal" value={budgetInput} onChange={e => setBudgetInput(e.target.value)} onBlur={() => setBudget(parseFloat(budgetInput) || 0)} placeholder="Set a budget (optional)" style={{ flex: 1, minHeight: 44, padding: '10px 14px', fontSize: 15 }} onKeyDown={e => e.key === 'Enter' && (setBudget(parseFloat(budgetInput) || 0), e.target.blur())} />
            <button onClick={() => { haptic(); setBudget(parseFloat(budgetInput) || 0); }} style={{ minHeight: 44, padding: '0 18px', borderRadius: 'var(--r-md)', background: 'var(--brand)', color: dark ? '#04140b' : '#fff', border: 'none', fontWeight: 700, fontSize: 14, cursor: 'pointer', flexShrink: 0, fontFamily: 'Syne' }}>Set</button>
          </div>
          {budget > 0 && (
            <div style={{ marginTop: 11 }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                <span style={{ fontSize: 12.5, fontWeight: 600 }}>
                  {overBudget ? <span style={{ color: 'var(--danger-text)' }}>⚠ Over by {money(Math.abs(remaining))}</span>
                    : nearBudget ? <span style={{ color: 'var(--warn-text)' }}>⚠ {money(remaining)} left</span>
                      : <span style={{ color: 'var(--text-2)' }}>{money(remaining)} remaining</span>}
                </span>
                <span style={{ fontSize: 12, color: 'var(--text-3)' }}>{money(total)} / {money(budget)}</span>
              </div>
              <div className="bar-track">
                <div className="bar-fill" style={{ width: `${pct}%`, background: overBudget ? 'var(--danger)' : nearBudget ? 'var(--accent)' : 'var(--brand)' }} />
              </div>
            </div>
          )}
        </div>

        {(() => {
          const inCart = new Set(items.map(i => i.name.toLowerCase()));
          const chips = topItems.filter(t => !inCart.has(t.display.toLowerCase())).slice(0, 8);
          if (!chips.length) return null;
          return (
            <div className="fade-up" style={{ padding: '14px 0 2px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '0 18px 8px' }}>
                <span style={{ fontSize: 13 }}>⚡</span>
                <span className="label" style={{ margin: 0 }}>Quick add</span>
              </div>
              <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '0 16px 4px' }} className="hide-scroll">
                {chips.map(t => (
                  <button key={t.display} className="chip" onClick={() => quickAdd(t)} style={{ flexShrink: 0 }}>
                    + {t.display} <span style={{ opacity: .55, fontWeight: 700 }}>{money(t.lastPrice)}</span>
                  </button>
                ))}
              </div>
            </div>
          );
        })()}

        <div style={{ padding: '16px 16px 0', paddingBottom: 'calc(200px + env(safe-area-inset-bottom))' }}>
          {items.length === 0 ? (
            <div className="empty-state fade-up">
              <div className="empty-icon">🛒</div>
              <div className="empty-title">Cart is empty</div>
              <div className="empty-sub">Tap the <strong>+</strong> button to add your first item.</div>
            </div>
          ) : (
            <>
              <div style={{ fontSize: 11.5, color: 'var(--text-3)', textAlign: 'right', padding: '0 4px 8px', fontWeight: 500 }}>← swipe to delete</div>
              {items.map((it, i) => (
                <div key={it.id || i} className="fade-up" style={{ animationDelay: `${Math.min(i * 35, 280)}ms` }}>
                  <ItemCard item={it} onEdit={() => editItem(i)} onDelete={() => deleteItem(i)} />
                </div>
              ))}
            </>
          )}
        </div>

        <button className="fab" style={{ bottom: `calc(var(--nav-h) + env(safe-area-inset-bottom) + 96px)` }} onClick={() => { haptic(); setEditIdx(null); setModalOpen(true); }} aria-label="Add item">+</button>

        <div className="summary-bar" style={{ bottom: `calc(var(--nav-h) + env(safe-area-inset-bottom))` }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-end', marginBottom: 11 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '.5px' }}>Items</div>
              <div style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 22 }}>{totalQty}</div>
            </div>
            <div style={{ textAlign: 'right' }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '.5px' }}>Total</div>
              <div style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 27, color: overBudget ? 'var(--danger-text)' : 'var(--brand)' }}>{money(total)}</div>
            </div>
          </div>
          <button className="btn-primary" onClick={saveSession} disabled={items.length === 0}>💾 Save trip</button>
        </div>
      </>
    );
  };

  /* ── History ── */
  const renderHistory = () => {
    const q = historySearch.trim().toLowerCase();
    const searched = q ? sessions.filter(s => s.storeName.toLowerCase().includes(q) || s.items.some(i => i.name.toLowerCase().includes(q))) : sessions;
    const groups = {};
    searched.forEach(s => {
      const d = new Date(s.dateTime);
      const k = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
      if (!groups[k]) groups[k] = { label: d.toLocaleString('default', { month: 'long', year: 'numeric' }), list: [] };
      groups[k].list.push(s);
    });
    const sortedKeys = Object.keys(groups).sort((a, b) => b.localeCompare(a));
    const visible = historyFilter === 'all' ? searched : (groups[historyFilter]?.list || []);
    const filteredGroups = historyFilter === 'all' ? sortedKeys.map(k => ({ k, ...groups[k] })) : (groups[historyFilter] ? [{ k: historyFilter, ...groups[historyFilter] }] : []);
    const allTime = sessions.reduce((s, x) => s + x.totalAmount, 0);
    const filteredTotal = visible.reduce((s, x) => s + x.totalAmount, 0);

    return (
      <div style={{ paddingBottom: 90 }} className="fade-up">
        {sessions.length === 0 ? (
          <div className="empty-state" style={{ paddingTop: 70 }}>
            <div className="empty-icon">📁</div>
            <div className="empty-title">No trips yet</div>
            <div className="empty-sub">Finish a grocery run and it shows up here.</div>
          </div>
        ) : (
          <>
            <div style={{ padding: '16px 16px 4px', display: 'flex', gap: 10 }}>
              {[['Trips', sessions.length, 'var(--text-1)'], ['All-time', money(allTime).replace('.00', ''), 'var(--brand)'], ['Avg/trip', money(allTime / sessions.length).replace('.00', ''), 'var(--text-1)']].map(([l, v, c]) => (
                <div className="stat-card" style={{ flex: 1 }} key={l}>
                  <div style={{ fontSize: 11, fontWeight: 700, color: 'var(--text-3)', textTransform: 'uppercase', letterSpacing: '.5px', marginBottom: 4 }}>{l}</div>
                  <div style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 21, color: c }}>{v}</div>
                </div>
              ))}
            </div>

            <div style={{ padding: '10px 16px 4px' }}>
              <input className="field" type="search" placeholder="🔍  Search store or item…" value={historySearch} onChange={e => setHistorySearch(e.target.value)} style={{ minHeight: 46, fontSize: 15 }} />
            </div>

            <div style={{ padding: '8px 0 4px' }}>
              <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '0 16px 6px' }} className="hide-scroll">
                <button className={'chip' + (historyFilter === 'all' ? ' on' : '')} onClick={() => { haptic(); setHistoryFilter('all'); }}>All</button>
                {sortedKeys.map(k => <button key={k} className={'chip' + (historyFilter === k ? ' on' : '')} onClick={() => { haptic(); setHistoryFilter(k); }}>{groups[k].label}</button>)}
              </div>
            </div>

            {historyFilter !== 'all' && (
              <div style={{ padding: '2px 18px 8px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <span style={{ fontSize: 13, color: 'var(--text-2)' }}>{visible.length} trip{visible.length !== 1 ? 's' : ''}</span>
                <span style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 15, color: 'var(--brand)' }}>{money(filteredTotal)}</span>
              </div>
            )}

            {filteredGroups.length === 0 ? (
              <div className="empty-state" style={{ paddingTop: 40 }}>
                <div className="empty-icon">🔍</div>
                <div className="empty-title" style={{ fontSize: 16 }}>No matches</div>
                <div className="empty-sub">Try a different search or month.</div>
              </div>
            ) : filteredGroups.map(({ k, label, list }) => (
              <div key={k}>
                {historyFilter === 'all' && <div className="month-label">{label}</div>}
                {list.map(s => (
                  <div key={s.id} className="history-card">
                    <div className="tile-icon">🏪</div>
                    <div style={{ flex: 1, minWidth: 0 }} onClick={() => setReceipt(s)}>
                      <div style={{ fontFamily: 'Syne', fontWeight: 700, fontSize: 15, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.storeName}</div>
                      <div style={{ fontSize: 12.5, color: 'var(--text-2)', marginTop: 2 }}>{s.items.length} items • {new Date(s.dateTime).toLocaleDateString()}</div>
                    </div>
                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                      <div style={{ fontFamily: 'Syne', fontWeight: 800, color: 'var(--brand)', fontSize: 16 }}>{money(s.totalAmount)}</div>
                      <div style={{ display: 'flex', gap: 5, justifyContent: 'flex-end', marginTop: 7 }}>
                        <button className="icon-btn" style={{ width: 38, height: 38, fontSize: 14, background: 'var(--info-bg)', color: 'var(--info-text)' }} onClick={() => setReceipt(s)} aria-label="View receipt">👁</button>
                        <button className="icon-btn" style={{ width: 38, height: 38, fontSize: 14, background: 'var(--danger-bg)', color: 'var(--danger-text)' }} onClick={() => { haptic(); setConfirm({ title: 'Delete trip?', body: `Delete "${s.storeName}" from ${new Date(s.dateTime).toLocaleDateString()}?`, confirmLabel: 'Delete', onConfirm: () => { setConfirm(null); deleteSession(s.id); } }); }} aria-label="Delete trip">🗑️</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            ))}
          </>
        )}
      </div>
    );
  };

  /* ── Analytics ── */
  const renderAnalytics = () => (
    <div style={{ padding: '18px 16px 90px' }} className="fade-up">
      <div style={{ marginBottom: 18 }}>
        <h2 style={{ fontWeight: 800, fontSize: 23, margin: '0 0 4px' }}>Spending insights</h2>
        <p style={{ color: 'var(--text-2)', fontSize: 14, margin: 0 }}>Built from your saved trips.</p>
      </div>
      {sessions.length === 0 ? (
        <div className="empty-state surface-card" style={{ padding: '48px 24px' }}>
          <div className="empty-icon">📊</div>
          <div className="empty-title">No data yet</div>
          <div className="empty-sub">Save a few trips to unlock charts.</div>
        </div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {[['📅 Monthly spending', 'mChart', 170], ['🏪 By store', 'sChart', 170], ['🔝 Top items', 'pChart', 210]].map(([t, id, h]) => (
            <div className="stat-card" key={id}>
              <div style={{ fontFamily: 'Syne', fontWeight: 700, fontSize: 15, marginBottom: 14 }}>{t}</div>
              <canvas id={id} height={h}></canvas>
            </div>
          ))}
        </div>
      )}
    </div>
  );

  /* ── Compare ── */
  const renderCompare = () => {
    const itemStoreMap = {};
    sessions.forEach(s => s.items.forEach(it => {
      const key = it.name.trim().toLowerCase();
      if (!itemStoreMap[key]) itemStoreMap[key] = { displayName: it.name.trim(), stores: {} };
      if (!itemStoreMap[key].stores[s.storeName]) itemStoreMap[key].stores[s.storeName] = [];
      itemStoreMap[key].stores[s.storeName].push(it.price);
    }));
    const comparable = Object.values(itemStoreMap)
      .filter(e => Object.keys(e.stores).length >= 2)
      .map(entry => {
        const storeEntries = Object.entries(entry.stores).map(([store, prices]) => ({ store, avgPrice: prices.reduce((a, b) => a + b, 0) / prices.length, minPrice: Math.min(...prices), maxPrice: Math.max(...prices), appearances: prices.length }));
        storeEntries.sort((a, b) => a.avgPrice - b.avgPrice);
        const priceDiff = storeEntries[storeEntries.length - 1].avgPrice - storeEntries[0].avgPrice;
        const savingsPct = ((priceDiff / storeEntries[storeEntries.length - 1].avgPrice) * 100).toFixed(0);
        return { ...entry, storeEntries, cheapest: storeEntries[0].store, priceDiff, savingsPct };
      })
      .sort((a, b) => b.priceDiff - a.priceDiff);
    const allCompareStores = [...new Set(comparable.flatMap(c => c.storeEntries.map(e => e.store)))];
    const filtered = comparable.filter(c => (!compareSearch || c.displayName.toLowerCase().includes(compareSearch.toLowerCase())) && (compareStore === 'all' || c.storeEntries.some(e => e.store === compareStore)));
    const BAR = ['#22c55e', '#3b82f6', '#f59e0b', '#ec4899', '#8b5cf6', '#06b6d4'];
    const colorMap = {}; allCompareStores.forEach((s, i) => colorMap[s] = BAR[i % BAR.length]);

    return (
      <div style={{ paddingBottom: 90 }} className="fade-up">
        <div style={{ padding: '18px 16px 12px' }}>
          <h2 style={{ fontWeight: 800, fontSize: 23, margin: '0 0 4px' }}>Price compare</h2>
          <p style={{ color: 'var(--text-2)', fontSize: 14, margin: 0, lineHeight: 1.5 }}>Items you bought at 2+ stores — find who's cheaper.</p>
        </div>

        {sessions.length < 2 || comparable.length === 0 ? (
          <div className="empty-state surface-card" style={{ margin: '8px 16px', padding: '48px 24px' }}>
            <div className="empty-icon">⚖️</div>
            <div className="empty-title">{sessions.length < 2 ? 'Need more trips' : 'No shared items yet'}</div>
            <div className="empty-sub">{sessions.length < 2 ? 'Save 2+ trips from different stores to compare.' : 'Buy the same item at 2+ stores and it appears here.'}</div>
          </div>
        ) : (
          <>
            <div style={{ margin: '0 16px 14px', background: 'var(--success-bg)', border: '1px solid var(--success-border)', borderRadius: 'var(--r-md)', padding: '15px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
              {[[comparable.length, 'items'], [allCompareStores.length, 'stores'], [money(comparable.reduce((s, c) => s + c.priceDiff, 0)), 'max savings']].map(([v, l], i) => (
                <div key={i} style={{ textAlign: i === 0 ? 'left' : i === 1 ? 'center' : 'right' }}>
                  <div style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 21, color: 'var(--success-text)' }}>{v}</div>
                  <div style={{ fontSize: 11.5, fontWeight: 600, color: 'var(--success-text)', opacity: .85 }}>{l}</div>
                </div>
              ))}
            </div>

            <div style={{ padding: '0 16px 10px' }}>
              <input className="field" type="search" placeholder="🔍  Search item…" value={compareSearch} onChange={e => setCompareSearch(e.target.value)} style={{ minHeight: 46, fontSize: 15 }} />
            </div>

            {allCompareStores.length > 1 && (
              <div style={{ display: 'flex', gap: 8, overflowX: 'auto', padding: '0 16px 12px' }} className="hide-scroll">
                <button className={'chip' + (compareStore === 'all' ? ' on' : '')} onClick={() => { haptic(); setCompareStore('all'); }}>All stores</button>
                {allCompareStores.map(st => <button key={st} className={'chip' + (compareStore === st ? ' on' : '')} onClick={() => { haptic(); setCompareStore(st); }}>🏪 {st}</button>)}
              </div>
            )}

            {filtered.length === 0 ? (
              <div className="empty-state" style={{ paddingTop: 32 }}>
                <div className="empty-icon">🔍</div>
                <div className="empty-title" style={{ fontSize: 16 }}>No matches</div>
              </div>
            ) : filtered.map((item, idx) => {
              const maxP = Math.max(...item.storeEntries.map(e => e.avgPrice));
              return (
                <div key={item.displayName} className="fade-up surface-card" style={{ animationDelay: `${Math.min(idx * 35, 240)}ms`, margin: '0 16px 12px', overflow: 'hidden' }}>
                  <div style={{ padding: '14px 16px 10px', display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 10 }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 16, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{item.displayName}</div>
                      <div style={{ fontSize: 12, color: 'var(--text-2)', marginTop: 2 }}>Across {item.storeEntries.length} stores</div>
                    </div>
                    {item.priceDiff > 0 && <span className="pill" style={{ background: 'var(--success-bg)', color: 'var(--success-text)', flexShrink: 0 }}>Save {money(item.priceDiff)} · {item.savingsPct}%</span>}
                  </div>
                  <div style={{ padding: '4px 16px 14px', display: 'flex', flexDirection: 'column', gap: 11 }}>
                    {item.storeEntries.map(e => {
                      const barPct = maxP > 0 ? (e.avgPrice / maxP) * 100 : 100;
                      const isCheap = e.store === item.cheapest;
                      const color = colorMap[e.store] || '#22c55e';
                      return (
                        <div key={e.store}>
                          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 5 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 6, minWidth: 0 }}>
                              <span style={{ width: 8, height: 8, borderRadius: 999, background: color, flexShrink: 0 }} />
                              <span style={{ fontSize: 13, fontWeight: 600, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{e.store}</span>
                              {isCheap && <span className="pill" style={{ background: 'var(--success-bg)', color: 'var(--success-text)', fontSize: 10, padding: '2px 7px', flexShrink: 0 }}>✓ Best</span>}
                              {e.appearances > 1 && <span style={{ color: 'var(--text-3)', fontSize: 11, flexShrink: 0 }}>{e.appearances}×</span>}
                            </div>
                            <div style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 15, color: isCheap ? 'var(--success-text)' : 'var(--text-1)', flexShrink: 0, marginLeft: 8 }}>{money(e.avgPrice)}</div>
                          </div>
                          <div style={{ height: 6, background: 'var(--surface-3)', borderRadius: 999, overflow: 'hidden' }}>
                            <div style={{ height: '100%', width: `${barPct}%`, background: isCheap ? color : `${color}88`, borderRadius: 999, transition: 'width .6s var(--ease)' }} />
                          </div>
                          {e.minPrice !== e.maxPrice && <div style={{ fontSize: 10, color: 'var(--text-3)', marginTop: 3 }}>Range {money(e.minPrice)}–{money(e.maxPrice)}</div>}
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ borderTop: '1px solid var(--border)', padding: '11px 16px', background: 'var(--surface-2)', display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                    <span style={{ fontSize: 14 }}>🏆</span>
                    <span style={{ fontSize: 13, color: 'var(--text-2)' }}>Best at</span>
                    <span style={{ fontSize: 13, fontWeight: 700 }}>{item.cheapest}</span>
                    <span style={{ fontFamily: 'Syne', fontWeight: 800, fontSize: 14, color: 'var(--success-text)', marginLeft: 'auto' }}>{money(item.storeEntries[0].avgPrice)}</span>
                  </div>
                </div>
              );
            })}
          </>
        )}
      </div>
    );
  };

  const navItems = [
    { id: 'shopping', icon: '🛒', label: 'Shop' },
    { id: 'history', icon: '📁', label: 'History' },
    { id: 'analytics', icon: '📈', label: 'Stats' },
    { id: 'compare', icon: '⚖️', label: 'Compare' },
  ];

  return (
    <div style={{ minHeight: '100dvh', background: 'var(--surface)' }}>
      <div className="top-bar">
        <div style={{ display: 'flex', alignItems: 'center', gap: 9 }}>
          <span style={{ width: 34, height: 34, borderRadius: 11, background: 'linear-gradient(140deg,#22c55e,#15803d)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 18, boxShadow: '0 4px 12px rgba(22,163,74,.35)' }}>🛡️</span>
          <h1 style={{ fontWeight: 800, fontSize: 20, margin: 0 }}>GroceryGuard</h1>
        </div>
        <button className="icon-btn" onClick={() => { haptic(); setDark(!dark); }} aria-label="Toggle theme">{dark ? '☀️' : '🌙'}</button>
      </div>

      <div style={{ paddingBottom: sessionOn && tab === 'shopping' ? 0 : 'calc(var(--nav-h) + env(safe-area-inset-bottom))' }}>
        {booting ? <SkeletonList /> : (
          <>
            {tab === 'shopping' && renderShopping()}
            {tab === 'history' && renderHistory()}
            {tab === 'analytics' && renderAnalytics()}
            {tab === 'compare' && renderCompare()}
          </>
        )}
      </div>

      <nav className="bottom-nav">
        {navItems.map(n => (
          <button key={n.id} className={`nav-btn${tab === n.id ? ' active' : ''}`} onClick={() => { haptic(); setTab(n.id); }}>
            <span className="ic">{n.icon}</span>
            <span>{n.label}</span>
          </button>
        ))}
      </nav>

      <ItemModal isOpen={modalOpen} onClose={() => { setModalOpen(false); setEditIdx(null); }} onSave={addOrUpdate} initialItem={editIdx !== null ? items[editIdx] : null} suggestIndex={suggestIndex} />
      <ReceiptModal session={receipt} onClose={() => setReceipt(null)} />
      {confirm && <ConfirmDialog {...confirm} onCancel={() => { const fn = confirm.onCancel; setConfirm(null); fn && fn(); }} />}
      <Toast data={toast} onUndo={runUndo} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

/* PWA manifest — makes the app installable to the home screen */
if (!window._manifest) {
  window._manifest = true;
  const icon = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="112" fill="#16a34a"/><text x="50%" y="52%" font-size="300" text-anchor="middle" dominant-baseline="central">🛡️</text></svg>');
  const manifest = { name: 'GroceryGuard', short_name: 'GroceryGuard', description: 'Smart grocery budget tracker & price log', display: 'standalone', orientation: 'portrait', background_color: '#0b1018', theme_color: '#16a34a', start_url: '.', icons: [{ src: icon, sizes: '192x192', type: 'image/svg+xml', purpose: 'any' }, { src: icon, sizes: '512x512', type: 'image/svg+xml', purpose: 'maskable' }] };
  const mBlob = new Blob([JSON.stringify(manifest)], { type: 'application/manifest+json' });
  const l = document.createElement('link'); l.rel = 'manifest'; l.href = URL.createObjectURL(mBlob); document.head.appendChild(l);
  const al = document.createElement('link'); al.rel = 'apple-touch-icon'; al.href = icon; document.head.appendChild(al);
}

/* Service worker — offline shell */
if ('serviceWorker' in navigator && !window._swReg) {
  window._swReg = true;
  const sw = `self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>{e.respondWith(fetch(e.request).then(r=>{const c=r.clone();caches.open('gg-v2').then(ca=>ca.put(e.request,c));return r;}).catch(()=>caches.match(e.request)));});`;
  const blob = new Blob([sw], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}
</script>
</body>
</html>
